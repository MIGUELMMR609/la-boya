        '</div>';

      content.innerHTML = html;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      // Photo circle click → camera
      document.getElementById('formPhotoCircle').addEventListener('click', function() {
        if (!fotoPreviewUrl && !fotoFile) document.getElementById('formFileCamera').click();
      });

      // Camera / Gallery buttons
      document.getElementById('formPhotoCam').addEventListener('click', function() {
        document.getElementById('formFileCamera').click();
      });
      document.getElementById('formPhotoGal').addEventListener('click', function() {
        document.getElementById('formFileGallery').click();
      });

      // Mostrar preview circular tras recorte o selección directa
      function mostrarPreview(dataUrl) {
        fotoPreviewUrl = dataUrl;
        var circle = document.getElementById('formPhotoCircle');
        circle.classList.add('has-photo');
        circle.innerHTML = '<img id="formPhotoPreview" src="' + dataUrl + '" alt=""><button type="button" class="form-photo-remove" id="formPhotoRemove">\u00d7</button>';
        document.getElementById('formPhotoRemove').addEventListener('click', function(ev2) {
          ev2.stopPropagation();
          removePhoto();
        });
      }

      // Abrir editor de recorte con Cropper.js
      function abrirCropEditor(dataUrl) {
        var cropOverlay = document.getElementById('cropOverlay');
        var cropImage = document.getElementById('cropImage');
        cropImage.src = dataUrl;
        cropOverlay.classList.add('open');

        var cropper = new window.Cropper(cropImage, {
          aspectRatio: 1,
          viewMode: 1,
          dragMode: 'move',
          guides: false,
          center: true,
          autoCropArea: 0.9,
          cropBoxResizable: false,
          toggleDragModeOnDblclick: false,
          minCropBoxWidth: 200,
          background: false,
          zoomable: true,
          wheelZoomRatio: 0.1
        });

        function limpiarCropper() {
          cropper.destroy();
          cropOverlay.classList.remove('open');
          cropImage.src = '';
          document.getElementById('cropCancel').removeEventListener('click', onCancel);
          document.getElementById('cropConfirm').removeEventListener('click', onConfirm);
          document.getElementById('cropRotate').removeEventListener('click', onRotate);
        }

        function onCancel() {
          limpiarCropper();
          // Limpiar input para que se pueda volver a elegir la misma foto
          document.getElementById('formFileCamera').value = '';
          document.getElementById('formFileGallery').value = '';
        }

        function onConfirm() {
          var canvas = cropper.getCroppedCanvas({
            width: 500,
            height: 500,
            imageSmoothingQuality: 'high'
          });
          canvas.toBlob(function(blob) {
            fotoFile = new File([blob], 'foto.jpg', { type: 'image/jpeg' });
            mostrarPreview(canvas.toDataURL('image/jpeg', 0.92));
            limpiarCropper();
          }, 'image/jpeg', 0.92);
        }

        function onRotate() {
          cropper.rotate(90);
        }

        document.getElementById('cropCancel').addEventListener('click', onCancel);
        document.getElementById('cropConfirm').addEventListener('click', onConfirm);
        document.getElementById('cropRotate').addEventListener('click', onRotate);
      }

      // File selected
      function handleFile(e) {
        var file = e.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function(ev) {
          // Si Cropper.js está disponible, abrir editor
          if (window.Cropper) {
            abrirCropEditor(ev.target.result);
          } else {
            // Fallback: usar foto sin recortar
            console.log('Cropper.js no disponible, subiendo foto sin recortar');
            fotoFile = file;
            mostrarPreview(ev.target.result);
          }
        };
        reader.readAsDataURL(file);
      }
      document.getElementById('formFileCamera').addEventListener('change', handleFile);
      document.getElementById('formFileGallery').addEventListener('change', handleFile);

      // Remove photo
      function removePhoto() {
        fotoFile = null;
        fotoPreviewUrl = '';
        var circle = document.getElementById('formPhotoCircle');
        circle.classList.remove('has-photo');
        circle.innerHTML = '<svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg><span class="photo-hint">Tocar para a\u00f1adir foto</span>';
        document.getElementById('formFileCamera').value = '';
        document.getElementById('formFileGallery').value = '';
      }

      // Remove button for existing photo
      var rmBtn = document.getElementById('formPhotoRemove');
      if (rmBtn) {
        rmBtn.addEventListener('click', function(ev) {
          ev.stopPropagation();
          removePhoto();
        });
      }

      // Asiduidad buttons
      var asidBtns = document.querySelectorAll('#formAsidBtns .asiduidad-btn');
      for (var i = 0; i < asidBtns.length; i++) {
        asidBtns[i].addEventListener('click', function() {
          asiduidadForm = parseInt(this.getAttribute('data-val'), 10);
          var all = document.querySelectorAll('#formAsidBtns .asiduidad-btn');
          for (var j = 0; j < all.length; j++) {
            var v = parseInt(all[j].getAttribute('data-val'), 10);
            all[j].className = 'asiduidad-btn' + (v === asiduidadForm ? ' sel-' + v : '');
          }
        });
      }

      // Cancel / Back
      function cerrarForm() {
        overlay.classList.remove('open');
        setTimeout(function() { document.body.style.overflow = ''; }, 300);
      }
      document.getElementById('formCancel').addEventListener('click', cerrarForm);
      document.getElementById('formBack').addEventListener('click', cerrarForm);

      // Submit
      document.getElementById('formSubmit').addEventListener('click', function() {
        var btn = this;
        var nombre = document.getElementById('formNombre').value.trim();
        var apellidos = document.getElementById('formApellidos').value.trim();
        var numSocio = document.getElementById('formNumSocio').value.trim();
        var banner = document.getElementById('formErrorBanner');
        banner.style.display = 'none';

        // Limpiar errores
        var inputs = document.querySelectorAll('.form-input');
        for (var k = 0; k < inputs.length; k++) inputs[k].classList.remove('error');

        // Validar
        var errors = [];
        if (!nombre) { errors.push('Nombre'); document.getElementById('formNombre').classList.add('error'); }
        if (!apellidos) { errors.push('Apellidos'); document.getElementById('formApellidos').classList.add('error'); }
        if (!numSocio || isNaN(parseInt(numSocio, 10))) { errors.push('N\u00ba de socio'); document.getElementById('formNumSocio').classList.add('error'); }
        if (errors.length) {
          banner.textContent = 'Completa los campos obligatorios: ' + errors.join(', ');
          banner.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Guardando...';

        var formData = new FormData();
        formData.append('nombre', nombre);
        formData.append('apellidos', apellidos);
        formData.append('num_socio', numSocio);
        formData.append('antiguedad_años', document.getElementById('formAntiguedad').value || '0');
        var telVal = (document.getElementById('formTelefono').value || '').trim();
        if (telVal && /^\d{9}$/.test(telVal.replace(/\s/g, ''))) telVal = '+34 ' + telVal;
        formData.append('telefono', telVal);
        formData.append('asiduidad', asiduidadForm);
        formData.append('notas', document.getElementById('formNotas').value);
        if (fotoFile) formData.append('foto', fotoFile);

        var url = esEdicion ? '/api/socios/' + socioExistente.id : '/api/socios';
        var method = esEdicion ? 'PUT' : 'POST';

        fetch(url, { method: method, body: formData })
          .then(function(res) {
            if (!res.ok) return res.json().then(function(d) { throw new Error(d.error || 'Error del servidor'); });
            return res.json();
          })
          .then(function() {
            cerrarForm();
            recargarSocios(function() {
              showToast(esEdicion ? '\u2713 Socio actualizado' : '\u2713 Socio creado');
            });
          })
          .catch(function(err) {
            console.error(err);
            banner.textContent = err.message || 'Error al guardar';
            banner.style.display = 'block';
            btn.disabled = false;
            btn.textContent = btnText;
          });
      });
    }

    // === TABS ===
    function setTab(tab) {
      localStorage.setItem('la_boya_tab', tab);
      var tabs = document.querySelectorAll('.tab-btn');
      for (var i = 0; i < tabs.length; i++) {
        if (tabs[i].getAttribute('data-tab') === tab) tabs[i].classList.add('active');
        else tabs[i].classList.remove('active');
      }
      document.getElementById('tab-socios').className = 'tab-content' + (tab === 'socios' ? ' active' : '');
      document.getElementById('tab-eventos').className = 'tab-content' + (tab === 'eventos' ? ' active' : '');
      if (tab === 'eventos') {
        cargarEventos();
      }
    }

    // === EVENTOS ===
    var eventos = [];
    var MESES_LARGO = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    function formatFechaEvento(str) {
      if (!str) return '';
      var p = str.split('-');
      if (p.length !== 3) return str;
      return parseInt(p[2], 10) + ' ' + MESES_LARGO[parseInt(p[1], 10) - 1] + ' ' + p[0];
    }

    function cargarEventos() {
      var loaderE = document.getElementById('loaderEventos');
      loaderE.style.display = '';
      fetch('/api/eventos')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          eventos = data;
          console.log('Eventos cargados:', data.length);
          loaderE.style.display = 'none';
          renderEventos();
        })
        .catch(function(err) {
          console.error('Error al cargar eventos:', err);
          loaderE.style.display = 'none';
          showError(friendlyError(err));
        });
    }

    function renderEventos() {
      var lista = document.getElementById('eventosLista');
      var countEl = document.getElementById('eventosCount');
      countEl.textContent = eventos.length ? eventos.length + ' eventos' : '';
      lista.innerHTML = '';

      if (eventos.length === 0) {
        lista.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-state-icon"><svg viewBox="0 0 64 64"><rect x="10" y="8" width="44" height="48" rx="6"/><line x1="10" y1="20" x2="54" y2="20"/><line x1="24" y1="4" x2="24" y2="14"/><line x1="40" y1="4" x2="40" y2="14"/><line x1="32" y1="30" x2="32" y2="46"/><line x1="24" y1="38" x2="40" y2="38"/></svg></div>' +
            '<div class="empty-state-title">A\u00fan no hay eventos</div>' +
            '<div class="empty-state-sub">Pulsa + para crear el primero</div>' +
            '<button class="empty-state-btn" id="emptyAddEvtBtn">+ Crear primer evento</button>' +
          '</div>';
        document.getElementById('emptyAddEvtBtn').addEventListener('click', function() { abrirFormularioEvento(); });
        return;
      }

      for (var i = 0; i < eventos.length; i++) {
        var e = eventos[i];
        var badgeClass = e.tipo === 'comida_social' ? 'evt-badge-comida' : 'evt-badge-evento';
        var badgeText = e.tipo === 'comida_social' ? 'COMIDA SOCIAL' : 'EVENTO';
        var infoText = e.estado === 'finalizado' ? '\u2713 Finalizado' :
          (e.asistentes && e.asistentes.length > 0 ? e.asistentes.length + ' asistentes' : 'Sin asistentes a\u00fan');
        var priceText = '';
        if (e.modo_calculo === 'precio_fijo' && e.precio_por_persona != null) {
          priceText = e.precio_por_persona + ' \u20ac/persona';
        } else if (e.modo_calculo === 'total_dividido' && e.coste_total != null) {
          priceText = 'Total: ' + e.coste_total + ' \u20ac';
        }

        var card = document.createElement('div');
        card.className = 'evt-card';
        card.innerHTML =
          '<div class="evt-card-top">' +
            '<span class="evt-badge ' + badgeClass + '">' + badgeText + '</span>' +
            '<div style="display:flex;align-items:center;gap:8px">' +
              '<span class="evt-date">' + escapeHtml(formatFechaEvento(e.fecha)) + '</span>' +
              '<button class="evt-menu-btn" data-evt-id="' + e.id + '">\u22ef</button>' +
            '</div>' +
          '</div>' +
          '<div class="evt-name">' + escapeHtml(e.nombre) + '</div>' +
          '<div class="evt-info-row">' +
            '<span class="evt-info">' + infoText + '</span>' +
            '<span class="evt-price">' + escapeHtml(priceText) + '</span>' +
          '</div>' +
          '<div class="evt-menu" id="menu_' + e.id + '">' +
            '<button class="evt-menu-item" data-del-id="' + e.id + '">Eliminar evento</button>' +
          '</div>';

        lista.appendChild(card);
      }

      // Menu handlers
      var menuBtns = lista.querySelectorAll('.evt-menu-btn');
      for (var m = 0; m < menuBtns.length; m++) {
        menuBtns[m].addEventListener('click', function(ev) {
          ev.stopPropagation();
          var id = this.getAttribute('data-evt-id');
          var menu = document.getElementById('menu_' + id);
          // Close all menus first
          var allMenus = lista.querySelectorAll('.evt-menu');
          for (var x = 0; x < allMenus.length; x++) {
            if (allMenus[x] !== menu) allMenus[x].classList.remove('open');
          }
          menu.classList.toggle('open');
        });
      }

      // Delete handlers
      var delBtns = lista.querySelectorAll('.evt-menu-item[data-del-id]');
      for (var d = 0; d < delBtns.length; d++) {
        delBtns[d].addEventListener('click', function() {
          var id = this.getAttribute('data-del-id');
          if (!confirm('\u00bfSeguro que quieres eliminar este evento?')) return;
          fetch('/api/eventos/' + id, { method: 'DELETE' })
            .then(function(r) { if (!r.ok) throw new Error('Error'); return r.json(); })
            .then(function() { cargarEventos(); showToast('\u2713 Evento eliminado'); })
            .catch(function(err) { showError(friendlyError(err)); });
        });
      }

      // Close menus on outside click
      document.addEventListener('click', function closeMenus() {
        var allMenus = document.querySelectorAll('.evt-menu.open');
        for (var x = 0; x < allMenus.length; x++) allMenus[x].classList.remove('open');
      }, { once: false });

      // Card click → abrir detalle
      var cards = lista.querySelectorAll('.evt-card');
      for (var c = 0; c < cards.length; c++) {
        cards[c].addEventListener('click', function(ev) {
          if (ev.target.closest('.evt-menu-btn') || ev.target.closest('.evt-menu')) return;
          var id = this.querySelector('.evt-menu-btn').getAttribute('data-evt-id');
          abrirDetalleEvento(id);
        });
      }
    }

    // === FORMULARIO EVENTO ===
    function abrirFormularioEvento() {
      var overlay = document.getElementById('evtFormOverlay');
      var content = document.getElementById('evtFormContent');

      var hoy = new Date().toISOString().split('T')[0];
      var tipoSel = 'comida_social';

          '<button class="ficha-back" id="evtFormBack">\u2190</button>' +
          '<span class="form-bar-title">Nuevo evento</span>' +

          '<div class="form-field">' +
            '<label class="form-label">Fecha *</label>' +

      content.innerHTML = html;

      // Tipo selection

      function renderCamposDinamicos() {

          cont.innerHTML =
            '<div class="form-field">' +
              '<label class="form-label">Precio por persona</label>' +
              '<div class="input-with-unit">' +
                '<input class="form-input" id="evtPrecio" type="number" value="25" min="0" step="0.5">' +
                '<span class="input-unit">\u20ac</span>' +
              '</div>' +
            '</div>';

          cont.innerHTML =
            '<div class="form-field">' +

      function cerrarEvtForm() {
        overlay.classList.remove('open');
        setTimeout(function() { document.body.style.overflow = ''; }, 300);

      document.getElementById('evtFormBack').addEventListener('click', cerrarEvtForm);

      // Submit
      document.getElementById('evtFormSubmit').addEventListener('click', function() {
        var btn = this;
        var banner = document.getElementById('evtFormError');
        banner.style.display = 'none';

        var fecha = document.getElementById('evtFecha').value;
        if (!fecha) { banner.textContent = 'La fecha es obligatoria'; banner.style.display = 'block'; return; }

        var body = { tipo: tipoSel, fecha: fecha, notas: document.getElementById('evtNotas').value };

        if (tipoSel === 'comida_social') {
          var precio = parseFloat((document.getElementById('evtPrecio') || {}).value);
          body.precio_por_persona = isNaN(precio) ? 25 : precio;
          body.modo_calculo = 'precio_fijo';
        } else {
          var nombre = (document.getElementById('evtNombre') || {}).value;
          if (!nombre || !nombre.trim()) { banner.textContent = 'El nombre del evento es obligatorio'; banner.style.display = 'block'; return; }
          body.nombre = nombre.trim();
        }

        btn.disabled = true;
        btn.textContent = 'Creando...';

        fetch('/api/eventos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
        .then(function(r) {
          if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'Error'); });
          return r.json();
        })
        .then(function() {
          cerrarEvtForm();
          cargarEventos();
          showToast('\u2713 Evento creado');
        })
        .catch(function(err) {
          banner.textContent = err.message || 'Error al crear evento';
          banner.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Crear evento';
        });
      });

    function abrirWhatsApp(telefono, mensaje) {

    var SVG_BOYA = '<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 21v-2a7 7 0 0114 0v2"/><path d="M16 3l2 2-2 2"/></svg>';

    // === DETALLE EVENTO ===
    function abrirDetalleEvento(evtId) {
      fetch('/api/eventos/' + evtId)
        .then(function(r) { if (!r.ok) throw new Error('No encontrado'); return r.json(); })
        .then(function(evt) { renderDetalleEvento(evt); })
        .catch(function(err) { showError(friendlyError(err)); });

    function renderDetalleEvento(evt) {
      var overlay = document.getElementById('evtDetalleOverlay');
      var content = document.getElementById('evtDetalleContent');
      var finalizado = evt.estado === 'finalizado';
      var badgeClass = evt.tipo === 'comida_social' ? 'evt-badge-comida' : 'evt-badge-evento';
      var badgeText = evt.tipo === 'comida_social' ? 'COMIDA SOCIAL' : 'EVENTO';

      // Calcular resumen
      var tieneCoste = evt.modo_calculo != null;
      var nBoya = (evt.invitados_boya || []).length;
      var pagantes = 0; // socios + sus invitados extra (pagan)
      var totalCobrado = 0;
      var ppp = 0;
      for (var i = 0; i < evt.asistentes.length; i++) {
        pagantes += 1 + (evt.asistentes[i].invitados || 0);
      }
      var totalPersonas = pagantes + nBoya; // todos los que comen
      if (tieneCoste) {
        if (evt.modo_calculo === 'precio_fijo') {
          ppp = evt.precio_por_persona || 0;
        } else {
          // Dividir solo entre pagantes, no entre BOYA
          ppp = pagantes > 0 ? Math.round(((evt.coste_total || 0) / pagantes) * 100) / 100 : 0;
        }
        var totalRecaudar = ppp * pagantes;
        for (var j = 0; j < evt.asistentes.length; j++) {
          if (evt.asistentes[j].pagado) totalCobrado += (1 + (evt.asistentes[j].invitados || 0)) * ppp;
        }
      } else {
        var totalRecaudar = 0;
      }
      var costeBoya = nBoya * ppp;

      var bannerHtml = finalizado ? '<div class="evt-det-banner">\u2713 Evento finalizado</div>' : '';
      var notasHtml = evt.notas ? '<div class="evt-det-notas">' + escapeHtml(evt.notas.length > 80 ? evt.notas.substring(0, 80) + '...' : evt.notas) + '</div>' : '';

      // Botones de acción
      var lockHtml = finalizado ? '<span class="lock-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>' : '';
      var disAttr = finalizado ? ' disabled' : '';
      var actionBtns = '';
      var boyaBtn = '<button class="evt-action-btn" id="btnBoya"' + disAttr + ' style="border-color:#F0997B">' + lockHtml + SVG_BOYA + 'Inv. BOYA (' + nBoya + ')</button>';
      if (evt.tipo === 'comida_social') {
        actionBtns =
          '<button class="evt-action-btn" id="btnCocineros"' + disAttr + '>' + lockHtml + SVG_COOK + 'Cocineros (' + (evt.cocineros || []).length + ')</button>' +
          '<button class="evt-action-btn" id="btnComensales"' + disAttr + '>' + lockHtml + SVG_PEOPLE + 'Comensales (' + evt.asistentes.length + ')</button>' +
          '<button class="evt-action-btn" id="btnInvitados"' + disAttr + '>' + lockHtml + SVG_PLUS + 'Invitados</button>' +
          boyaBtn;
      } else {
        actionBtns =
          '<button class="evt-action-btn" id="btnComensales"' + disAttr + '>' + lockHtml + SVG_PEOPLE + 'Asistentes (' + evt.asistentes.length + ')</button>' +
          '<button class="evt-action-btn" id="btnInvitados"' + disAttr + '>' + lockHtml + SVG_PLUS + 'Invitados</button>' +
          boyaBtn;
      }

      // Listado asistentes (agrupados: pendientes arriba, pagados abajo)
      var asistHtml = '';
      if (evt.asistentes.length === 0) {
        asistHtml = '<div class="sel-hint" style="padding:20px 16px;color:#999">A\u00fan no hay asistentes. Pulsa ' + (evt.tipo === 'comida_social' ? 'Comensales' : 'Asistentes') + ' para a\u00f1adir.</div>';
      } else {
        var sortByApellidos = function(a, b) {
          var sa = findSocio(a.socio_id); var sb = findSocio(b.socio_id);
          if (!sa || !sb) return 0;
          return norm(sa.apellidos).localeCompare(norm(sb.apellidos));
        };
        var pendientes = evt.asistentes.filter(function(a) { return !a.pagado; }).sort(sortByApellidos);
        var pagados = evt.asistentes.filter(function(a) { return a.pagado; }).sort(sortByApellidos);

        asistHtml = '<div class="evt-asist-list" id="asistListContainer">';

        if (pendientes.length === 0 && pagados.length > 0) {
          asistHtml += '<div class="evt-asist-all-paid">\u2713 Todos los asistentes han pagado</div>';
        }

        function renderAsistRow(as) {
          var soc = findSocio(as.socio_id);
          if (!soc) return '';
          var isCook = (evt.cocineros || []).indexOf(as.socio_id) !== -1;
          var avatarBg = soc.avatar_color || '#85B7EB';
          var avatarTxt = TEXT_COLORS[avatarBg] || '#333';
          var ini = getInitials(soc.nombre, soc.apellidos);
          var avatarInner = soc.foto_url
            ? '<img src="' + cloudinaryThumb(soc.foto_url, 80) + '" alt="" loading="lazy">'
            : '<span style="color:' + avatarTxt + '">' + ini + '</span>';
          var cookBadge = isCook ? '<div class="evt-asist-cook-badge"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M6 21v-1a6 6 0 0112 0v1"/></svg></div>' : '';
          var invText = as.invitados > 0 ? '<div class="evt-asist-extra">+ ' + as.invitados + ' invitado' + (as.invitados > 1 ? 's' : '') + '</div>' : '';
          var amount = (1 + (as.invitados || 0)) * ppp;
          return '<div class="evt-asist-row" data-row-sid="' + as.socio_id + '">' +
            '<div class="evt-asist-avatar" style="background:' + (soc.foto_url ? 'transparent' : avatarBg) + '">' + avatarInner + cookBadge + '</div>' +
            '<div class="evt-asist-info"><div class="evt-asist-name">' + escapeHtml(soc.nombre + ' ' + soc.apellidos) + '</div>' + invText + '</div>' +
            '<span class="evt-asist-amount">' + amount.toFixed(2) + ' \u20ac</span>' +
            (!as.pagado && soc.telefono ? '<button class="btn-wa-sm btn-wa-recall" data-recall-sid="' + as.socio_id + '" title="Recordar pago por WhatsApp">' + SVG_WA + '</button>' : '') +
            '<button class="check-pagado' + (as.pagado ? ' checked' : '') + '" data-sid="' + as.socio_id + '">' + SVG_CHECK + '</button>' +
          '</div>';
        }

        if (pendientes.length > 0) {
          asistHtml += '<div class="evt-asist-section-title">PENDIENTES DE PAGO (' + pendientes.length + ')</div>';
          for (var k = 0; k < pendientes.length; k++) asistHtml += renderAsistRow(pendientes[k]);
        }
        if (pagados.length > 0) {
          asistHtml += '<div class="evt-asist-section-title">PAGADOS (' + pagados.length + ')</div>';
          for (var k2 = 0; k2 < pagados.length; k2++) asistHtml += renderAsistRow(pagados[k2]);
        }

        asistHtml += '</div>';
      }

      // Invitados BOYA en listado
      if (nBoya > 0) {
        asistHtml += '<div class="evt-asist-list"><div style="font-size:11px;text-transform:uppercase;color:#999;letter-spacing:0.3px;padding:8px 0 4px;border-top:0.5px solid #E0E0E0;margin-top:4px">INVITADOS BOYA (sin pago)</div>';
        var boyaSorted = (evt.invitados_boya || []).slice().sort(function(a, b) { return norm(a.nombre).localeCompare(norm(b.nombre)); });
        for (var bi = 0; bi < boyaSorted.length; bi++) {
          var bInv = boyaSorted[bi];
          var bIni = bInv.nombre.charAt(0).toUpperCase();
          var bWords = bInv.nombre.trim().split(/\s+/);
          if (bWords.length > 1) bIni += bWords[1].charAt(0).toUpperCase();
          asistHtml +=
            '<div class="evt-asist-row">' +
              '<div class="evt-asist-avatar" style="background:#F0997B"><span style="color:#4A1B0C;font-size:13px">' + bIni + '</span></div>' +
              '<div class="evt-asist-info"><div class="evt-asist-name">' + escapeHtml(bInv.nombre) + '</div><div class="evt-asist-extra" style="color:#412402;background:#FAEEDA;display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;margin-top:2px">No paga</div></div>' +
              '<button class="ficha-back" data-del-boya="' + bInv.id + '" style="font-size:12px;color:#A32D2D">\u00d7</button>' +
            '</div>';
        }
        asistHtml += '</div>';
      }

      var html =
        '<div class="ficha-bar" style="position:relative;justify-content:space-between">' +
          '<button class="ficha-back" id="evtDetBack">\u2190 Volver</button>' +
          '<div style="display:flex;align-items:center;gap:8px">' +
          '<button class="evt-menu-btn" id="evtDetMenuBtn">\u22ef</button>' +
          '<button class="ficha-back" id="evtDetClose" style="font-size:20px;color:#999" title="Cerrar">\u00d7</button>' +
          '</div>' +
          '<div class="evt-det-menu" id="evtDetMenu">' +
            '<button class="evt-det-menu-item" id="evtDetEditar">Editar datos</button>' +
            '<button class="evt-det-menu-item" id="evtDetEstado">' + (finalizado ? 'Reabrir evento' : 'Marcar como finalizado') + '</button>' +
            '<button class="evt-det-menu-item danger" id="evtDetEliminar">Eliminar evento</button>' +
          '</div>' +
        '</div>' +
        '<div class="evt-det-scroll">' +
        bannerHtml +
        '<div class="evt-det-header">' +
          '<span class="evt-badge ' + badgeClass + '">' + badgeText + '</span>' +
          '<div class="evt-det-name">' + escapeHtml(evt.nombre) + '</div>' +
          '<div class="evt-det-date">' + escapeHtml(formatFechaEvento(evt.fecha)) + '</div>' +
          notasHtml +
        '</div>' +
        '<hr class="ficha-sep">' +
        (tieneCoste ? (function() {
          var pendiente = Math.round((totalRecaudar - totalCobrado) * 100) / 100;
          var pendClass, pendNum, pendLabel;
          if (pendiente > 0) {
            pendClass = 'pendiente-rojo';
            pendNum = '<span style="white-space:nowrap">' + pendiente.toFixed(2) + ' \u20ac</span>';
            pendLabel = 'PENDIENTE';
          } else if (pendiente === 0) {
            pendClass = 'pendiente-verde';
            pendNum = '\u2713 OK';
            pendLabel = 'PENDIENTE';
          } else {
            pendClass = 'pendiente-azul';
            pendNum = '<span style="white-space:nowrap">+' + Math.abs(pendiente).toFixed(2) + ' \u20ac</span>';
            pendLabel = 'SOBRANTE';
          }
          return '<div class="evt-resumen">' +
            '<div class="evt-resumen-card"><div class="evt-resumen-num"><span style="white-space:nowrap">' + totalPersonas + '</span></div><div class="evt-resumen-label">Asistentes</div></div>' +
            '<div class="evt-resumen-card"><div class="evt-resumen-num"><span style="white-space:nowrap">' + (totalPersonas > 0 ? ppp.toFixed(2) + ' \u20ac' : '\u2014') + '</span></div><div class="evt-resumen-label">Por persona</div></div>' +
            '<div class="evt-resumen-card"><div class="evt-resumen-num"><span style="white-space:nowrap">' + totalRecaudar.toFixed(2) + ' \u20ac</span></div><div class="evt-resumen-label">Total</div></div>' +
            '<div class="evt-resumen-card' + (totalCobrado > 0 ? ' pendiente-verde' : '') + '"><div class="evt-resumen-num"><span style="white-space:nowrap">' + totalCobrado.toFixed(2) + ' \u20ac' + (totalCobrado > 0 && totalCobrado >= totalRecaudar ? ' \u2713' : '') + '</span></div><div class="evt-resumen-label">Cobrado</div></div>' +
            '<div class="evt-resumen-card ' + pendClass + '"><div class="evt-resumen-num">' + pendNum + '</div><div class="evt-resumen-label">' + pendLabel + '</div></div>' +
          '</div>';
        })() +
          (costeBoya > 0 ? '<div style="padding:0 16px 8px;font-size:11px;color:#999">Coste asumido por la sociedad (Inv. BOYA): <strong>' + costeBoya.toFixed(2) + ' \u20ac</strong></div>' : '') +
          '<div style="display:flex;justify-content:center;padding:4px 16px 12px"><button class="btn-modificar-coste" id="btnModCoste"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Modificar coste del evento</button></div>'
        :
          '<div class="evt-resumen">' +
            '<div class="evt-resumen-card"><div class="evt-resumen-num"><span style="white-space:nowrap">' + totalPersonas + '</span></div><div class="evt-resumen-label">Asistentes</div></div>' +
          '</div>' +
          '<div class="coste-card" id="btnAsignarCoste"><div class="coste-card-text">Asignar coste</div></div>'
        ) +
        '<hr class="ficha-sep">' +
        '<div class="evt-action-btns">' + actionBtns + '</div>' +
        (evt.asistentes.some(function(a) { var sc = findSocio(a.socio_id); return sc && sc.telefono; })
          ? '<div style="padding:0 16px 8px"><button class="btn-wa btn-wa-big" id="btnAvisarWa">' + SVG_WA + ' Avisar a asistentes</button></div>'
          : '') +
        '<hr class="ficha-sep">' +
        asistHtml +
        '</div>' +
        '<div class="evt-bottom-bar">' +
          '<button class="ficha-back" id="evtDetBackMobile">\u2190 Volver</button>' +
          '<button class="btn-guardar" id="evtDetPdf" style="min-width:80px">PDF</button>' +
        '</div>';

      content.innerHTML = html;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      function cerrarDetalle() {
        overlay.classList.remove('open');
        document.removeEventListener('keydown', escH);
        setTimeout(function() { document.body.style.overflow = ''; cargarEventos(); }, 300);
      }
      document.getElementById('evtDetBack').addEventListener('click', cerrarDetalle);
      document.getElementById('evtDetBackMobile').addEventListener('click', cerrarDetalle);
      document.getElementById('evtDetClose').addEventListener('click', cerrarDetalle);
      var escH = function(e) { if (e.key === 'Escape') cerrarDetalle(); };
      document.addEventListener('keydown', escH);

      // Menu
      document.getElementById('evtDetMenuBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        document.getElementById('evtDetMenu').classList.toggle('open');
      });
      document.addEventListener('click', function closeDetMenu() {
        var m = document.getElementById('evtDetMenu');
        if (m) m.classList.remove('open');
      });

      // Estado
      document.getElementById('evtDetEstado').addEventListener('click', function() {
        var newEstado = finalizado ? 'abierto' : 'finalizado';
        fetch('/api/eventos/' + evt.id + '/estado', {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ estado: newEstado })
        }).then(function(r) { return r.json(); })
        .then(function(updated) { renderDetalleEvento(updated); showToast('\u2713 Estado actualizado'); })
        .catch(function(err) { showError(friendlyError(err)); });
      });

      // Editar
      document.getElementById('evtDetEditar').addEventListener('click', function() {
        abrirFormularioEventoEdicion(evt, function() {
          fetch('/api/eventos/' + evt.id).then(function(r) { return r.json(); }).then(renderDetalleEvento);
        });
      });

      // Eliminar
      document.getElementById('evtDetEliminar').addEventListener('click', function() {
        if (!confirm('\u00bfSeguro que quieres eliminar este evento?')) return;
        fetch('/api/eventos/' + evt.id, { method: 'DELETE' })
          .then(function(r) { if (!r.ok) throw new Error('Error'); return r.json(); })
          .then(function() { cerrarDetalle(); showToast('\u2713 Evento eliminado'); })
          .catch(function(err) { showError(friendlyError(err)); });
      });

      // PDF: modal con 2 opciones
      document.getElementById('evtDetPdf').addEventListener('click', function() {
        if (evt.asistentes.length === 0 && (!evt.invitados_boya || evt.invitados_boya.length === 0)) {
          showToast('A\u00f1ade asistentes primero'); return;
        }
        if (!window.jspdf) { showToast('No se pudo cargar el generador de PDF'); return; }
        abrirModalPdf(evt, ppp, totalPersonas, pagantes, totalRecaudar, totalCobrado, nBoya, costeBoya);
      });

      // Asignar / Modificar coste
      var btnAsignar = document.getElementById('btnAsignarCoste');
      var btnMod = document.getElementById('btnModCoste');
      if (btnAsignar) btnAsignar.addEventListener('click', function() { abrirModalCoste(evt); });
      if (btnMod) btnMod.addEventListener('click', function() { abrirModalCoste(evt); });

      // Toast si intentan pulsar botón finalizado
      var finToastShown = false;
      if (finalizado) {
        var actionBtnEls = content.querySelectorAll('.evt-action-btn');
        for (var fb = 0; fb < actionBtnEls.length; fb++) {
          actionBtnEls[fb].addEventListener('click', function() {
            if (!finToastShown) { showToast('Evento finalizado. Re\u00e1brelo desde \u22ef M\u00e1s.'); finToastShown = true; }
          });
        }
      }

      // Check pagado con reordenación animada
      var checks = content.querySelectorAll('.check-pagado');
      for (var ch = 0; ch < checks.length; ch++) {
        checks[ch].addEventListener('click', function() {
          var sid = this.getAttribute('data-sid');
          var checkBtn = this;
          var wasPagado = checkBtn.classList.contains('checked');
          var row = content.querySelector('[data-row-sid="' + sid + '"]');

          // Optimistic: toggle check
          checkBtn.classList.toggle('checked');

          // Flash color on the row
          if (row) {
            row.style.background = wasPagado ? '#FEF5F5' : '#F5FAE8';
            setTimeout(function() { row.style.background = ''; }, 400);
          }

          // Update local data
          for (var ai = 0; ai < evt.asistentes.length; ai++) {
            if (evt.asistentes[ai].socio_id === sid) { evt.asistentes[ai].pagado = !wasPagado; break; }
          }

          // Animate fade-out → re-render list → fade-in
          if (row) row.classList.add('fading');
          setTimeout(function() {
            // Re-render just the asistentes list section
            renderDetalleEvento(evt);
          }, 220);

          // Backend call
          fetch('/api/eventos/' + evt.id + '/asistente/' + sid, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pagado: !wasPagado })
          }).then(function(r) { if (!r.ok) throw new Error('Error'); return r.json(); })
          .then(function(updated) { evt = updated; })
          .catch(function() {
            // Revert
            for (var ri = 0; ri < evt.asistentes.length; ri++) {
              if (evt.asistentes[ri].socio_id === sid) { evt.asistentes[ri].pagado = wasPagado; break; }
            }
            renderDetalleEvento(evt);
            showError('Error al actualizar pago');
          });
        });
      }

      // WhatsApp recordar pago
      var recallBtns = content.querySelectorAll('.btn-wa-recall');
      for (var rb = 0; rb < recallBtns.length; rb++) {
        recallBtns[rb].addEventListener('click', function(e) {
          e.stopPropagation();
          if (!verificarClaveAdmin()) return;
          var sid = this.getAttribute('data-recall-sid');
          var soc = findSocio(sid);
          if (!soc || !soc.telefono) { showToast('Sin tel\u00e9fono'); return; }
          var asist = evt.asistentes.find(function(a) { return a.socio_id === sid; });
          var amt = asist ? ((1 + (asist.invitados || 0)) * ppp).toFixed(2) : '0';
          var nombre1 = soc.nombre.split(' ')[0];
          var msg = 'Hola ' + nombre1 + ', te recuerdo que quedan pendientes ' + amt + '\u20ac por ' + evt.nombre + ' del ' + fechaDiaMes(evt.fecha) + '. Un saludo. LA BOYA.';
          abrirWhatsApp(soc.telefono, msg);
        });
      }

      // Avisar a asistentes masivo
      var btnAvisar = document.getElementById('btnAvisarWa');
      if (btnAvisar) {
        btnAvisar.addEventListener('click', function() {
          if (!verificarClaveAdmin()) return;
          abrirModalAvisarWa(evt, ppp);
        });
      }

      // Cocineros button
      var btnCock = document.getElementById('btnCocineros');
      if (btnCock) btnCock.addEventListener('click', function() {
        abrirSeleccion('cocineros', evt, function(updated) { renderDetalleEvento(updated); });
      });

      // Comensales button
      var btnCom = document.getElementById('btnComensales');
      if (btnCom) btnCom.addEventListener('click', function() {
        abrirSeleccion('comensales', evt, function(updated) { renderDetalleEvento(updated); });
      });

      // Invitados button
      var btnInv = document.getElementById('btnInvitados');
      if (btnInv) btnInv.addEventListener('click', function() {
        abrirSeleccion('invitados', evt, function(updated) { renderDetalleEvento(updated); });
      });

      // Invitados BOYA button
      var btnBoya = document.getElementById('btnBoya');
      if (btnBoya) btnBoya.addEventListener('click', function() {
        abrirPantallaBoya(evt, function(updated) { renderDetalleEvento(updated); });
      });

      // Delete BOYA buttons in attendee list
      var delBoyaBtns = content.querySelectorAll('[data-del-boya]');
      for (var db = 0; db < delBoyaBtns.length; db++) {
        delBoyaBtns[db].addEventListener('click', function() {
          var invId = this.getAttribute('data-del-boya');
          if (!confirm('\u00bfEliminar este invitado BOYA?')) return;
          fetch('/api/eventos/' + evt.id + '/invitados-boya/' + invId, { method: 'DELETE' })
            .then(function(r) { return r.json(); })
            .then(function(updated) { renderDetalleEvento(updated); showToast('\u2713 Invitado eliminado'); })
            .catch(function(err) { showError(friendlyError(err)); });
        });
      }
    }

    // === EDITAR EVENTO ===
    function abrirFormularioEventoEdicion(evt, onDone) {
      var overlay = document.getElementById('evtFormOverlay');
      var content = document.getElementById('evtFormContent');
      var modoSel = evt.modo_calculo || 'precio_fijo';

      var camposDin = '';
      if (evt.tipo === 'comida_social') {
        camposDin =
          '<div class="form-field">' +
            '<label class="form-label">Precio por persona</label>' +
            '<div class="input-with-unit">' +
              '<input class="form-input" id="evtPrecio" type="number" value="' + (evt.precio_por_persona || 25) + '" min="0" step="0.5">' +
              '<span class="input-unit">\u20ac</span>' +
            '</div>' +
          '</div>';
      } else {
        camposDin =
          '<div class="form-field">' +
            '<label class="form-label">Nombre del evento *</label>' +
            '<input class="form-input" id="evtNombre" type="text" value="' + escapeHtml(evt.nombre) + '">' +
          '</div>' +
          '<label class="form-label">C\u00e1lculo del coste</label>' +
          '<div class="modo-radios" id="modoRadios">' +
            '<button type="button" class="modo-radio' + (modoSel === 'precio_fijo' ? ' selected' : '') + '" data-modo="precio_fijo">Precio fijo</button>' +
            '<button type="button" class="modo-radio' + (modoSel === 'total_dividido' ? ' selected' : '') + '" data-modo="total_dividido">Total dividido</button>' +
          '</div>' +
          '<div id="evtCosteCampo"></div>';
      }

      var html =
        '<div class="form-bar">' +
          '<button class="ficha-back" id="evtFormBack">\u2190</button>' +
          '<span class="form-bar-title">Editar evento</span>' +
        '</div>' +
        '<div class="form-body">' +
          '<div class="form-error-banner" id="evtFormError"></div>' +
          '<div class="form-field"><label class="form-label">Tipo</label><div style="font-size:14px;color:#666;padding:6px 0">' + (evt.tipo === 'comida_social' ? 'Comida social' : 'Evento') + '</div></div>' +
          '<div class="form-field"><label class="form-label">Fecha *</label><input class="form-input" id="evtFecha" type="date" value="' + evt.fecha + '"></div>' +
          '<div id="evtCamposDinamicos">' + camposDin + '</div>' +
          '<div class="form-field"><label class="form-label">Notas</label><textarea class="notas-textarea-neutral" id="evtNotas">' + escapeHtml(evt.notas || '') + '</textarea></div>' +
        '</div>' +
        '<div class="form-actions">' +
          '<button class="btn-cancel" id="evtFormCancel">Cancelar</button>' +
          '<button class="btn-submit" id="evtFormSubmit">Guardar cambios</button>' +
        '</div>';

      content.innerHTML = html;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      // Modo radios for evento type
      if (evt.tipo === 'evento') {
        renderCosteCampoEdit();
        var modos = document.querySelectorAll('#modoRadios .modo-radio');
        for (var i = 0; i < modos.length; i++) {
          modos[i].addEventListener('click', function() {
            modoSel = this.getAttribute('data-modo');
            var all = document.querySelectorAll('#modoRadios .modo-radio');
            for (var l = 0; l < all.length; l++) all[l].classList.toggle('selected', all[l].getAttribute('data-modo') === modoSel);
            renderCosteCampoEdit();
          });
        }
      }

      function renderCosteCampoEdit() {
        var c = document.getElementById('evtCosteCampo');
        if (!c) return;
        if (modoSel === 'precio_fijo') {
          c.innerHTML = '<div class="form-field"><label class="form-label">Precio por persona</label><div class="input-with-unit"><input class="form-input" id="evtPrecio" type="number" value="' + (evt.precio_por_persona || '') + '" min="0" step="0.5"><span class="input-unit">\u20ac</span></div></div>';
        } else {
          c.innerHTML = '<div class="form-field"><label class="form-label">Gasto total</label><div class="input-with-unit"><input class="form-input" id="evtCosteTotal" type="number" value="' + (evt.coste_total || '') + '" min="0" step="1"><span class="input-unit">\u20ac</span></div></div>';
        }
      }

      function cerrarEvtEdit() {
        overlay.classList.remove('open');
        setTimeout(function() { document.body.style.overflow = ''; }, 300);
      }
      document.getElementById('evtFormCancel').addEventListener('click', cerrarEvtEdit);
      document.getElementById('evtFormBack').addEventListener('click', cerrarEvtEdit);

      document.getElementById('evtFormSubmit').addEventListener('click', function() {
        var btn = this;
        var banner = document.getElementById('evtFormError');
        banner.style.display = 'none';
        var body = { fecha: document.getElementById('evtFecha').value, notas: document.getElementById('evtNotas').value };
        if (evt.tipo === 'comida_social') {
          body.precio_por_persona = parseFloat((document.getElementById('evtPrecio') || {}).value) || 25;
          body.modo_calculo = 'precio_fijo';
        } else {
          body.nombre = (document.getElementById('evtNombre') || {}).value;
          if (!body.nombre || !body.nombre.trim()) { banner.textContent = 'Nombre obligatorio'; banner.style.display = 'block'; return; }
          body.modo_calculo = modoSel;
          if (modoSel === 'precio_fijo') {
            body.precio_por_persona = parseFloat((document.getElementById('evtPrecio') || {}).value);
            if (!body.precio_por_persona || body.precio_por_persona <= 0) { banner.textContent = 'Precio inv\u00e1lido'; banner.style.display = 'block'; return; }
          } else {
            body.coste_total = parseFloat((document.getElementById('evtCosteTotal') || {}).value);
            if (!body.coste_total || body.coste_total <= 0) { banner.textContent = 'Total inv\u00e1lido'; banner.style.display = 'block'; return; }
          }
        }
        btn.disabled = true;
        fetch('/api/eventos/' + evt.id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
          .then(function(r) { if (!r.ok) throw new Error('Error'); return r.json(); })
          .then(function() { cerrarEvtEdit(); showToast('\u2713 Evento actualizado'); if (onDone) onDone(); })
          .catch(function(err) { banner.textContent = friendlyError(err); banner.style.display = 'block'; btn.disabled = false; });
      });
    }

    // === PANTALLAS DE SELECCIÓN ===
    function abrirSeleccion(modo, evt, onDone) {
      var overlay = document.getElementById('selOverlay');
      var content = document.getElementById('selContent');
      var titulo = modo === 'cocineros' ? 'Cocineros' : (modo === 'invitados' ? 'Invitados extra' : (evt.tipo === 'comida_social' ? 'Comensales' : 'Asistentes'));
      var hint = '';
      if (modo === 'cocineros') hint = 'Toca los socios que van a cocinar. Toca de nuevo para quitarlos.';
      else if (modo === 'comensales') hint = 'Toca los socios que van a asistir.';
      else hint = 'Toca para a\u00f1adir +1 invitado. Mant\u00e9n pulsado para quitar.';

      // Determinar socios a mostrar
      var sociosVista = modo === 'invitados'
        ? socios.filter(function(s) { return evt.asistentes.some(function(a) { return a.socio_id === s.id; }); })
        : socios.slice();

      // Estado local
      var selCook = (evt.cocineros || []).slice();
      var selAsist = evt.asistentes.map(function(a) { return a.socio_id; });
      var invMap = {};
      for (var iv = 0; iv < evt.asistentes.length; iv++) invMap[evt.asistentes[iv].socio_id] = evt.asistentes[iv].invitados || 0;

      var firstInvTap = true;

      var searchHtml = modo !== 'invitados' ? '<div style="padding:0 16px 8px"><input class="search-input" id="selSearch" placeholder="Buscar..." autocomplete="off"></div>' : '';

      var hintHtml = '';
      if (modo === 'invitados') {
        hintHtml =
          '<div class="inv-instructions">' +
            '<div class="inv-instructions-title">C\u00f3mo a\u00f1adir invitados</div>' +
            '<div class="inv-instructions-grid">' +
              '<div class="inv-instr-col">' +
                '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18v3"/><path d="M8 18a4 4 0 018 0"/><circle cx="12" cy="10" r="3"/><path d="M12 2v2"/></svg>' +
                '<div class="inv-instr-text">Toca para sumar +1</div>' +
                '<div class="inv-instr-sub">Cada toque a\u00f1ade un invitado</div>' +
              '</div>' +
              '<div class="inv-instr-col">' +
                '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18v3"/><path d="M8 18a4 4 0 018 0"/><circle cx="12" cy="10" r="3"/><circle cx="19" cy="5" r="3"/><path d="M19 3.5v1.5l1 1"/></svg>' +
                '<div class="inv-instr-text">Mant\u00e9n pulsado para \u22121</div>' +
                '<div class="inv-instr-sub">Al menos medio segundo</div>' +
              '</div>' +
            '</div>' +
          '</div>';
      } else {
        hintHtml = '<div class="sel-hint">' + hint + '</div>';
      }

      var html =
        '<div class="sel-bar">' +
          '<button class="ficha-back" id="selBack">\u2190 Volver</button>' +
          '<span class="sel-bar-title">' + titulo + '</span>' +
          '<button class="btn-hecho" id="selDone">Hecho</button>' +
        '</div>' +
        hintHtml +
        searchHtml +
        '<div class="main" id="selGrid" style="padding:8px"></div>';

      content.innerHTML = html;
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      function renderSelGrid() {
        var grid = document.getElementById('selGrid');
        var query = '';
        var searchEl = document.getElementById('selSearch');
        if (searchEl) query = norm(searchEl.value.trim());
        var filtered = sociosVista.filter(function(s) {
          if (!query) return true;
          return norm(s.nombre + ' ' + s.apellidos).indexOf(query) !== -1;
        });
        filtered.sort(function(a, b) { return norm(a.apellidos).localeCompare(norm(b.apellidos)); });

        // Seleccionados primero (solo cocineros y comensales)
        var selIds = modo === 'cocineros' ? selCook : (modo === 'comensales' ? selAsist : []);
        if ((modo === 'cocineros' || modo === 'comensales') && selIds.length > 0) {
          var selGroup = filtered.filter(function(s) { return selIds.indexOf(s.id) !== -1; });
          var restGroup = filtered.filter(function(s) { return selIds.indexOf(s.id) === -1; });
          filtered = selGroup.concat(restGroup);
        }

        grid.innerHTML = '';
        var gridDiv = document.createElement('div');
        gridDiv.className = 'grid cols-2';
        gridDiv.style.gap = '6px';

        // Separador entre grupos
        var sepIdx = -1;
        if ((modo === 'cocineros' || modo === 'comensales') && selIds.length > 0 && selIds.length < filtered.length) {
          sepIdx = 0;
          for (var si = 0; si < filtered.length; si++) {
            if (selIds.indexOf(filtered[si].id) !== -1) sepIdx = si + 1;
            else break;
          }
        }

        for (var i = 0; i < filtered.length; i++) {
          if (i === sepIdx && sepIdx > 0) {
            var sep = document.createElement('div');
            sep.style.cssText = 'grid-column:1/-1;border-top:0.5px solid #E0E0E0;padding:6px 0 2px;font-size:11px;text-transform:uppercase;color:#999;letter-spacing:0.3px';
            sep.textContent = 'Resto de socios';
            gridDiv.appendChild(sep);
          }
          var s = filtered[i];
          var bgC = s.avatar_color || '#85B7EB';
          var txtC = TEXT_COLORS[bgC] || '#333';
          var ini = getInitials(s.nombre, s.apellidos);
          var avatarHtml = s.foto_url
            ? '<img src="' + cloudinaryThumb(s.foto_url, 120) + '" alt="" loading="lazy">'
            : '<span style="color:' + txtC + '">' + ini + '</span>';

          var overlayHtml = '';
          if (modo === 'cocineros') {
            var isSel = selCook.indexOf(s.id) !== -1;
            if (isSel) {
              overlayHtml = '<div class="sel-cook-overlay">' + SVG_COOK + '</div><div class="sel-check">' + SVG_CHECK + '</div>';
            }
          } else if (modo === 'comensales') {
            var isSel2 = selAsist.indexOf(s.id) !== -1;
            var isCookLocked = selCook.indexOf(s.id) !== -1;
            if (isSel2) overlayHtml = '<div class="sel-check">' + SVG_CHECK + '</div>';
            if (isCookLocked) overlayHtml += '<div class="evt-asist-cook-badge" style="top:-2px;left:-2px"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M6 21v-1a6 6 0 0112 0v1"/></svg></div>';
          } else {
            var invN = invMap[s.id] || 0;
            overlayHtml = '<div class="inv-badge' + (invN === 0 ? ' zero' : '') + '">' + (invN === 0 ? '0' : '+' + invN) + '</div>';
          }

          var card = document.createElement('div');
          card.className = 'card';
          card.style.cssText = 'padding:10px;gap:8px;flex-direction:row;cursor:pointer';
          card.setAttribute('data-sid', s.id);
          card.innerHTML =
            '<div class="avatar-wrap" style="position:relative">' +
              '<div class="avatar" style="background:' + (s.foto_url ? 'transparent' : bgC) + ';width:56px;height:56px;font-size:18px">' + avatarHtml + '</div>' +
              overlayHtml +
            '</div>' +
            '<div class="card-info"><div class="card-name" style="font-size:13px">' + escapeHtml(s.nombre) + '</div><div class="card-surname" style="font-size:11px">' + escapeHtml(s.apellidos) + '</div></div>';
          gridDiv.appendChild(card);
        }
        grid.innerHTML = '';
        grid.appendChild(gridDiv);

        // Tap handlers
        var cards = gridDiv.querySelectorAll('.card');
        for (var c = 0; c < cards.length; c++) {
          (function(card) {
            var sid = card.getAttribute('data-sid');
            if (modo === 'cocineros') {
              card.addEventListener('click', function() {
                var idx = selCook.indexOf(sid);
                if (idx === -1) selCook.push(sid);
                else selCook.splice(idx, 1);
                renderSelGrid();
              });
            } else if (modo === 'comensales') {
              card.addEventListener('click', function() {
                if (selCook.indexOf(sid) !== -1) {
                  showToast('El cocinero asiste obligatoriamente');
                  return;
                }
                var idx = selAsist.indexOf(sid);
                if (idx === -1) selAsist.push(sid);
                else selAsist.splice(idx, 1);
                renderSelGrid();
              });
            } else {
              // Invitados: tap +1, long press -1
              var timer = null;
              card.addEventListener('mousedown', function() { timer = setTimeout(function() { timer = 'long'; }, 500); });
              card.addEventListener('touchstart', function() { timer = setTimeout(function() { timer = 'long'; }, 500); }, { passive: true });
              card.addEventListener('mouseup', handleInvTap);
              card.addEventListener('touchend', handleInvTap);
              function handleInvTap(e) {
                e.preventDefault();
                if (timer === 'long') {
                  // Decrement
                  if ((invMap[sid] || 0) > 0) {
                    invMap[sid]--;
                    var soc = findSocio(sid);
                    showToast('\u2212 1 invitado de ' + (soc ? soc.nombre : sid));
                    if (navigator.vibrate) navigator.vibrate(50);
                  }
                } else {
                  clearTimeout(timer);
                  invMap[sid] = (invMap[sid] || 0) + 1;
                  if (firstInvTap) { firstInvTap = false; showToast('Mant\u00e9n pulsado si quieres restar'); }
                }
                timer = null;
                // Optimistic update to server
                fetch('/api/eventos/' + evt.id + '/asistente/' + sid, {
                  method: 'PUT', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ invitados: invMap[sid] || 0 })
                }).catch(function() { showError('Error al actualizar invitados'); });
                renderSelGrid();
              }
            }
          })(cards[c]);
        }
      }

      renderSelGrid();

      // Search
      var searchEl = document.getElementById('selSearch');
      if (searchEl) searchEl.addEventListener('input', renderSelGrid);

      // Back
      function cerrarSel() {
        overlay.classList.remove('open');
        setTimeout(function() { document.body.style.overflow = ''; }, 300);
      }

      document.getElementById('selBack').addEventListener('click', function() {
        if (modo === 'invitados') { cerrarSel(); fetch('/api/eventos/' + evt.id).then(function(r) { return r.json(); }).then(function(u) { if (onDone) onDone(u); }); return; }
        cerrarSel();
      });

      // Done
      document.getElementById('selDone').addEventListener('click', function() {
        if (modo === 'cocineros') {
          fetch('/api/eventos/' + evt.id + '/cocineros', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cocineros: selCook })
          }).then(function(r) { return r.json(); })
          .then(function(updated) { cerrarSel(); if (onDone) onDone(updated); showToast('\u2713 Cocineros guardados'); })
          .catch(function() { showError('Error al guardar cocineros'); });
        } else if (modo === 'comensales') {
          var asistBody = selAsist.map(function(sid) { return { socio_id: sid }; });
          fetch('/api/eventos/' + evt.id + '/asistentes', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ asistentes: asistBody })
          }).then(function(r) { return r.json(); })
          .then(function(updated) { cerrarSel(); if (onDone) onDone(updated); showToast('\u2713 Asistentes guardados'); })
          .catch(function() { showError('Error al guardar asistentes'); });
        } else {
          cerrarSel();
          fetch('/api/eventos/' + evt.id).then(function(r) { return r.json(); }).then(function(u) { if (onDone) onDone(u); });
        }
      });
    }

    // === PANTALLA INVITADOS BOYA ===
    function abrirPantallaBoya(evt, onDone) {
      var overlay = document.getElementById('selOverlay');
      var content = document.getElementById('selContent');

      function renderBoyaList() {
        var boyaList = (evt.invitados_boya || []).slice().sort(function(a, b) { return norm(a.nombre).localeCompare(norm(b.nombre)); });
        var listHtml = '';
        if (boyaList.length === 0) {
          listHtml = '<div class="sel-hint" style="padding:20px 16px;color:#999">No hay invitados BOYA a\u00fan.</div>';
        } else {
          listHtml = '<div class="evt-asist-list">';
          for (var i = 0; i < boyaList.length; i++) {
            var b = boyaList[i];
            var ini = b.nombre.charAt(0).toUpperCase();
            var w = b.nombre.trim().split(/\s+/);
            if (w.length > 1) ini += w[1].charAt(0).toUpperCase();
            listHtml +=
              '<div class="evt-asist-row">' +
                '<div class="evt-asist-avatar" style="background:#F0997B"><span style="color:#4A1B0C;font-size:13px">' + ini + '</span></div>' +
                '<div class="evt-asist-info"><div class="evt-asist-name">' + escapeHtml(b.nombre) + '</div><div class="evt-asist-extra" style="color:#412402;background:#FAEEDA;display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;margin-top:2px">No paga</div></div>' +
                '<button class="ficha-back boya-edit" data-bid="' + b.id + '" style="font-size:11px;color:#185FA5;margin-right:6px">Editar</button>' +
                '<button class="ficha-back boya-del" data-bid="' + b.id + '" style="font-size:14px;color:#A32D2D">\u00d7</button>' +
              '</div>';
          }
          listHtml += '</div>';

      }

      function renderBoyaScreen() {
        content.innerHTML =
          '<div class="sel-bar">' +
            '<button class="ficha-back" id="boyaBack">\u2190 Volver</button>' +
            '<span class="sel-bar-title">Invitados BOYA</span>' +
            '<button class="btn-hecho" id="boyaDone">Hecho</button>' +
          '</div>' +
          '<div style="background:#FAEEDA;border:0.5px solid #FAC775;border-radius:8px;padding:10px 14px;margin:8px 16px;font-size:12px;color:#412402">Los Invitados BOYA son personas ajenas a la sociedad que invita LA BOYA. Cuentan como comensales pero no pagan.</div>' +
          '<div style="padding:8px 16px"><button class="btn-submit" id="boyaAdd" style="width:100%">+ A\u00f1adir invitado</button></div>' +
          '<div id="boyaListContainer">' + renderBoyaList() + '</div>';

        document.getElementById('boyaAdd').addEventListener('click', function() {
          var nombre = prompt('Nombre del invitado:');
          if (!nombre || !nombre.trim()) return;
          fetch('/api/eventos/' + evt.id + '/invitados-boya', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre: nombre.trim() })
          }).then(function(r) { return r.json(); })
          .then(function(updated) { evt = updated; renderBoyaScreen(); showToast('\u2713 Invitado a\u00f1adido'); })
          .catch(function(err) { showError(friendlyError(err)); });
        });

        // Edit/delete handlers
        var editBtns = content.querySelectorAll('.boya-edit');
        for (var e = 0; e < editBtns.length; e++) {
          editBtns[e].addEventListener('click', function() {
            var bid = this.getAttribute('data-bid');
            var inv = (evt.invitados_boya || []).find(function(x) { return x.id === bid; });
            var newName = prompt('Nuevo nombre:', inv ? inv.nombre : '');
            if (!newName || !newName.trim()) return;
            fetch('/api/eventos/' + evt.id + '/invitados-boya/' + bid, {
              method: 'PUT', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ nombre: newName.trim() })
            }).then(function(r) { return r.json(); })
            .then(function(updated) { evt = updated; renderBoyaScreen(); })
            .catch(function(err) { showError(friendlyError(err)); });
          });
        }
        var delBtns = content.querySelectorAll('.boya-del');
        for (var d = 0; d < delBtns.length; d++) {
          delBtns[d].addEventListener('click', function() {
            var bid = this.getAttribute('data-bid');
            if (!confirm('\u00bfEliminar este invitado?')) return;
            fetch('/api/eventos/' + evt.id + '/invitados-boya/' + bid, { method: 'DELETE' })
              .then(function(r) { return r.json(); })
              .then(function(updated) { evt = updated; renderBoyaScreen(); showToast('\u2713 Eliminado'); })
              .catch(function(err) { showError(friendlyError(err)); });
          });
        }

        function cerrarBoya() {
          overlay.classList.remove('open');
          setTimeout(function() { document.body.style.overflow = ''; if (onDone) onDone(evt); }, 300);
        }
        document.getElementById('boyaBack').addEventListener('click', cerrarBoya);
        document.getElementById('boyaDone').addEventListener('click', cerrarBoya);
      }

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      renderBoyaScreen();
    }

      div.className = 'coste-modal-overlay open';
      div.id = 'costeModalOverlay';
      div.innerHTML =
        '<div class="coste-modal">' +
          '<div class="coste-modal-title">Asignar coste del evento</div>' +
          '<div class="modo-radios" id="costeModoRadios">' +
            '<button type="button" class="modo-radio' + (modoSel === 'precio_fijo' ? ' selected' : '') + '" data-modo="precio_fijo">Precio fijo/persona</button>' +
            '<button type="button" class="modo-radio' + (modoSel === 'total_dividido' ? ' selected' : '') + '" data-modo="total_dividido">Gasto total (dividir)</button>' +
          '</div>' +
          '<div id="costeModalCampo"></div>' +
          '<div style="display:flex;gap:8px;margin-top:14px">' +

        '</div>';

      function renderCampo() {
        var c = document.getElementById('costeModalCampo');
        if (modoSel === 'precio_fijo') {
          c.innerHTML = '<div class="form-field" style="margin-top:10px"><label class="form-label">Precio por persona</label><div class="input-with-unit"><input class="form-input" id="costeVal" type="number" value="' + (evt.precio_por_persona || '') + '" min="0" step="0.5"><span class="input-unit">\u20ac</span></div></div>';
        } else {
          c.innerHTML = '<div class="form-field" style="margin-top:10px"><label class="form-label">Importe total</label><div class="input-with-unit"><input class="form-input" id="costeVal" type="number" value="' + (evt.coste_total || '') + '" min="0" step="1"><span class="input-unit">\u20ac</span></div></div>';
        }
      }
      renderCampo();

      var radios = div.querySelectorAll('#costeModoRadios .modo-radio');

        radios[i].addEventListener('click', function() {
          modoSel = this.getAttribute('data-modo');
          for (var l = 0; l < radios.length; l++) radios[l].classList.toggle('selected', radios[l].getAttribute('data-modo') === modoSel);
          renderCampo();
        });
