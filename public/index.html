<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LA BOYA - Socios</title>
  <meta name="theme-color" content="#0C447C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='32' fill='%230C447C'/><text x='32' y='40' text-anchor='middle' font-family='system-ui,sans-serif' font-size='26' font-weight='700' fill='white'>LB</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230C447C'/><text x='90' y='115' text-anchor='middle' font-family='system-ui,sans-serif' font-size='72' font-weight='700' fill='white'>LB</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F5F5F5;
      min-height: 100vh;
    }

    /* === CABECERA === */
    .header {
      background: #fff;
      border-bottom: 0.5px solid #E0E0E0;
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 900px;
      margin: 0 auto;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #333;
    }
    .header-count {
      font-size: 13px;
      color: #888;
      margin-left: 8px;
      font-weight: 400;
    }
    .view-buttons {
      display: flex;
      gap: 4px;
    }
    .view-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #D0D0D0;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .view-btn.active {
      background: #333;
      border-color: #333;
    }
    .view-btn.active svg {
      stroke: #fff;
    }
    .view-btn svg {
      width: 16px;
      height: 16px;
      stroke: #555;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* === MOSAICO === */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 8px;
    }
    .grid {
      display: grid;
      gap: 6px;
    }
    .grid.cols-1 {
      grid-template-columns: 1fr;
    }
    .grid.cols-2 {
      grid-template-columns: 1fr 1fr;
    }
    .grid.cols-4 {
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 4px;
    }

    /* === TARJETA === */
    .card {
      background: #fff;
      border: 0.5px solid #E0E0E0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      cursor: pointer;
      overflow: hidden;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }
    .card:active {
      background: #F0F0F0;
      transform: scale(0.97);
    }
    @media (hover: hover) {
      .card:hover {
        background: #F9F9F9;
      }
    }

    /* Vista 2 columnas (por defecto) */
    .cols-2 .card {
      padding: 10px;
      gap: 10px;
      flex-direction: row;
    }
    .cols-2 .avatar {
      width: 80px;
      height: 80px;
      font-size: 24px;
    }
    .cols-2 .asiduidad-dot {
      width: 17px;
      height: 17px;
    }
    .cols-2 .card-name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }
    .cols-2 .card-surname {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }
    .cols-2 .card-extra {
      display: none;
    }

    /* Vista 1 columna (detalle) */
    .cols-1 .card {
      padding: 12px;
      gap: 12px;
      flex-direction: row;
    }
    .cols-1 .avatar {
      width: 90px;
      height: 90px;
      font-size: 28px;
    }
    .cols-1 .asiduidad-dot {
      width: 20px;
      height: 20px;
    }
    .cols-1 .card-name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }
    .cols-1 .card-surname {
      font-size: 14px;
      color: #666;
      margin-top: 1px;
    }
    .cols-1 .card-extra {
      display: block;
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    /* Vista 4 columnas (compacto) */
    .cols-4 .card {
      padding: 8px 4px;
      gap: 0;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .cols-4 .avatar {
      width: 60px;
      height: 60px;
      font-size: 18px;
    }
    .cols-4 .card-info {
      margin-top: 4px;
    }
    .cols-4 .card-name {
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }
    .cols-4 .card-surname {
      display: none;
    }
    .cols-4 .card-extra {
      display: none;
    }

    /* === AVATAR === */
    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .avatar {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      letter-spacing: 1px;
      user-select: none;
    }
    .asiduidad-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .cols-4 .asiduidad-dot {
      width: 13px;
      height: 13px;
      bottom: 0;
      right: 0;
    }

    /* Colores de texto para cada avatar_color */
    .avatar[data-bg="#AFA9EC"] { color: #26215C; }
    .avatar[data-bg="#F0997B"] { color: #4A1B0C; }
    .avatar[data-bg="#5DCAA5"] { color: #04342C; }
    .avatar[data-bg="#85B7EB"] { color: #042C53; }
    .avatar[data-bg="#ED93B1"] { color: #4B1528; }
    .avatar[data-bg="#EF9F27"] { color: #412402; }
    .avatar[data-bg="#97C459"] { color: #173404; }
    .avatar[data-bg="#F7C1C1"] { color: #501313; }

    /* === BUSCADOR === */
    .header-search {
      max-width: 900px;
      margin: 10px auto 0;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px;
      border: 0.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #F5F5F5;
      outline: none;
    }
    .search-input:focus {
      border-color: #B5D4F4;
      background: #fff;
    }

    /* === PILLS === */
    .pills-row {
      max-width: 900px;
      margin: 8px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .pill {
      padding: 6px 12px;
      border: 0.5px solid #E0E0E0;
      border-radius: 999px;
      background: #fff;
      font-size: 13px;
      font-family: inherit;
      color: #555;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .pill.active {
      background: #E6F1FB;
      color: #0C447C;
      border-color: #B5D4F4;
    }
    .pill-asiduos {
      margin-left: auto;
    }
    .pill-asiduos.active {
      background: #EAF3DE;
      color: #173404;
      border-color: #C0DD97;
    }
    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #639922;
      display: inline-block;
    }

    /* === FICHA (OVERLAY) === */
    .ficha-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 200;
      background: #fff;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      height: 100dvh;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      visibility: hidden;
    }
    .ficha-overlay.open {
      transform: translateY(0);
      visibility: visible;
    }
    @media (min-width: 600px) {
      .ficha-overlay {
        background: rgba(0,0,0,0);
        align-items: flex-start;
        justify-content: center;
        padding: 40px 16px;
        height: auto;
        display: flex;
        transform: none;
        opacity: 0;
        transition: opacity 0.3s ease, visibility 0.3s;
      }
      .ficha-overlay.open {
        background: rgba(0,0,0,0.3);
        opacity: 1;
      }
      .ficha-content {
        max-width: 500px;
        width: 100%;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        transform: translateY(20px);
        transition: transform 0.3s ease;
      }
      .ficha-overlay.open .ficha-content {
        transform: translateY(0);
      }
    }
    .ficha-bar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 0.5px solid #E0E0E0;
    }
    .ficha-back {
      background: none;
      border: none;
      font-size: 15px;
      color: #185FA5;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      padding: 4px 0;
    }

    /* Barra inferior fija móvil */
    .ficha-bottom-bar {
      display: none;
    }
    @media (max-width: 599px) {
      .ficha-bar {
        display: none;
      }
      .notas-footer .btn-guardar {
        display: none;
      }
      .ficha-bottom-bar {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 210;
        background: #fff;
        border-top: 0.5px solid #E0E0E0;
        padding: 12px 16px;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .ficha-bottom-bar .ficha-back {
        display: block;
        min-height: 44px;
        font-size: 15px;
        padding: 8px 0;
      }
      .ficha-bottom-bar .btn-guardar {
        display: block;
        min-height: 44px;
        min-width: 120px;
        font-size: 15px;
        padding: 8px 20px;
      }
      .ficha-content {
        padding-bottom: calc(76px + env(safe-area-inset-bottom));
      }
    }
    .ficha-avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 16px;
    }
    .ficha-avatar-wrap {
      position: relative;
    }
    .ficha-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 36px;
      letter-spacing: 2px;
      user-select: none;
      transition: width 0.2s ease, height 0.2s ease, font-size 0.2s ease;
    }
    .ficha-asiduidad-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 3px solid #fff;
      transition: width 0.2s ease, height 0.2s ease;
    }

    /* Selector S/M/L */
    .ficha-size-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }
    .ficha-size-btn {
      width: 32px;
      height: 28px;
      border: 1px solid #E0E0E0;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ficha-size-btn.active {
      background: #E6F1FB;
      color: #0C447C;
      border-color: #B5D4F4;
    }

    .ficha-nombre {
      font-size: 18px;
      font-weight: 500;
      color: #333;
      margin-top: 12px;
      text-align: center;
    }
    .ficha-info {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
      text-align: center;
    }
    .ficha-sep {
      height: 0;
      border: none;
      border-top: 0.5px solid #E0E0E0;
      margin: 16px;
    }

    /* Asiduidad */
    .ficha-section-title {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 16px;
      margin-bottom: 8px;
    }
    .asiduidad-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 0 16px;
    }
    .asiduidad-btn {
      padding: 10px 4px;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .asiduidad-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .asiduidad-btn.sel-1 {
      background: #EAF3DE;
      border-color: #639922;
      color: #173404;
    }
    .asiduidad-btn.sel-2 {
      background: #FDF3E1;
      border-color: #EF9F27;
      color: #412402;
    }
    .asiduidad-btn.sel-3 {
      background: #FDEAEA;
      border-color: #E24B4A;
      color: #501313;
    }

    /* Notas */
    .notas-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 16px;
      margin-bottom: 8px;
    }
    .notas-hint {
      font-size: 10px;
      color: #BBB;
    }
    .notas-textarea {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px;
      padding: 10px 12px;
      background: #FAEEDA;
      border: 0.5px solid #FAC775;
      color: #412402;
      border-radius: 8px;
      min-height: 120px;
      font-size: 13px;
      line-height: 1.6;
      font-family: inherit;
      resize: vertical;
      outline: none;
    }
    .notas-textarea:focus {
      border-color: #E8A830;
    }
    .notas-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px 16px;
    }
    .notas-editado {
      font-size: 11px;
      color: #BBB;
    }
    .notas-footer-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notas-saved {
      font-size: 12px;
      color: #639922;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .notas-saved.visible {
      opacity: 1;
    }
    .btn-guardar {
      padding: 6px 16px;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-guardar:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* === TOAST === */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #185FA5;
      color: #fff;
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    @media (max-width: 599px) {
      .toast {
        bottom: calc(80px + env(safe-area-inset-bottom));
      }
    }

    /* === LOADER === */
    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      opacity: 1;
      transition: opacity 0.3s;
    }
    .loader-wrap.fade-out {
      opacity: 0;
    }
    .loader-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #E0E0E0;
      border-top-color: #185FA5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loader-text {
      font-size: 13px;
      color: #999;
      margin-top: 12px;
    }

    /* === BANNER ERROR GLOBAL === */
    .error-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 500;
      background: #FCEBEB;
      color: #791F1F;
      padding: 10px 40px 10px 16px;
      font-size: 13px;
      transform: translateY(-100%);
      transition: transform 0.3s;
    }
    .error-banner.visible {
      transform: translateY(0);
    }
    .error-banner-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: #791F1F;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    /* === ESTADO VACÍO === */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
    }
    .empty-state-icon svg {
      width: 64px;
      height: 64px;
      stroke: #CCC;
      fill: none;
      stroke-width: 1.5;
    }
    .empty-state-title {
      font-size: 16px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
    }
    .empty-state-sub {
      font-size: 13px;
      color: #999;
      margin-bottom: 16px;
    }
    .empty-state-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
    }

    /* === FOCUS GLOBAL === */
    input:focus, textarea:focus, button:focus-visible {
      outline: 2px solid #B5D4F4;
      outline-offset: 1px;
    }
    button:focus:not(:focus-visible) {
      outline: none;
    }

    /* === EDITOR DE RECORTE === */
    .crop-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .crop-overlay.open {
      display: flex;
    }
    .crop-container {
      background: #fff;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    @media (min-width: 600px) {
      .crop-container {
        max-width: 500px;
        max-height: 600px;
        width: 100%;
        height: auto;
        border-radius: 12px;
        overflow: hidden;
      }
    }
    .crop-header {
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 600;
      color: #333;
      border-bottom: 0.5px solid #E0E0E0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .crop-rotate-btn {
      background: none;
      border: 1px solid #D0D0D0;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: inherit;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .crop-rotate-btn svg {
      width: 14px;
      height: 14px;
      stroke: #555;
      fill: none;
      stroke-width: 2;
    }
    .crop-area {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }
    .crop-area img {
      display: block;
      max-width: 100%;
    }
    .crop-actions {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      flex-shrink: 0;
      border-top: 0.5px solid #E0E0E0;
    }
    @media (max-width: 599px) {
      .crop-actions {
        flex-direction: column;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
    }
    .crop-actions .btn-cancel {
      flex: 1;
    }
    .crop-actions .btn-submit {
      flex: 1;
    }
    /* Cropper.js: hacer el crop box circular */
    .cropper-view-box,
    .cropper-face {
      border-radius: 50%;
    }

    /* === FOTOS EN AVATAR === */
    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .ficha-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    /* === BOTÓN + === */
    .btn-add {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #185FA5;
      color: #fff;
      border: none;
      font-size: 22px;
      font-weight: 300;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 6px;
      flex-shrink: 0;
      line-height: 1;
    }

    /* === FORMULARIO OVERLAY === */
    .form-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 200;
      background: #fff;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      height: 100dvh;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      visibility: hidden;
    }
    .form-overlay.open {
      transform: translateY(0);
      visibility: visible;
    }
    @media (min-width: 600px) {
      .form-overlay {
        background: rgba(0,0,0,0);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 40px 16px;
        height: auto;
        transform: none;
        opacity: 0;
        transition: opacity 0.3s ease, visibility 0.3s;
      }
      .form-overlay.open {
        background: rgba(0,0,0,0.3);
        opacity: 1;
      }
      .form-content {
        max-width: 500px;
        width: 100%;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        transform: translateY(20px);
        transition: transform 0.3s ease;
      }
      .form-overlay.open .form-content {
        transform: translateY(0);
      }
    }
    .form-bar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 0.5px solid #E0E0E0;
    }
    .form-bar-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-left: 12px;
    }
    .form-body {
      padding: 20px 16px;
    }
    .form-photo-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }
    .form-photo-circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 2px dashed #CCC;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      background: #FAFAFA;
    }
    .form-photo-circle.has-photo {
      border-style: solid;
      border-color: #B5D4F4;
    }
    .form-photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .form-photo-circle svg {
      width: 32px;
      height: 32px;
      stroke: #BBB;
      fill: none;
      stroke-width: 1.5;
    }
    .form-photo-circle .photo-hint {
      font-size: 11px;
      color: #BBB;
      margin-top: 4px;
    }
    .form-photo-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .form-photo-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .form-photo-btn {
      font-size: 12px;
      color: #185FA5;
      background: none;
      border: 1px solid #B5D4F4;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
    }
    .form-field {
      margin-bottom: 14px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 0.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      outline: none;
    }
    .form-input:focus {
      border-color: #B5D4F4;
    }
    .form-input.error {
      border-color: #E24B4A;
      background: #FFF5F5;
    }
    .form-error-msg {
      font-size: 11px;
      color: #E24B4A;
      margin-top: 3px;
    }
    .form-error-banner {
      background: #FDEAEA;
      color: #A32D2D;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-top: 0.5px solid #E0E0E0;
    }
    .btn-cancel {
      background: none;
      border: 1px solid #D0D0D0;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      font-family: inherit;
      color: #555;
      cursor: pointer;
      min-height: 44px;
    }
    .btn-submit {
      background: #185FA5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      min-width: 130px;
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    @media (max-width: 599px) {
      .form-actions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 210;
        background: #fff;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
      }
      .form-body {
        padding-bottom: calc(80px + env(safe-area-inset-bottom));
      }
    }

    /* === BOTONES EDITAR/ELIMINAR EN FICHA === */
    .btn-editar-datos {
      background: none;
      border: 1px solid #D0D0D0;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 11px;
      font-family: inherit;
      color: #555;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-eliminar-socio {
      display: block;
      margin: 0 auto 20px;
      background: none;
      border: 1px solid #D4A0A0;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 12px;
      font-family: inherit;
      color: #A32D2D;
      cursor: pointer;
    }

    /* === RESPONSIVE === */
    @media (min-width: 768px) {
      .main {
        padding: 16px;
      }
      .grid {
        gap: 8px;
      }
      .grid.cols-4 {
        gap: 6px;
      }
    }
  </style>
</head>
<body>

  <!-- CABECERA -->
  <div class="header">
    <div class="header-top">
      <div>
        <span class="header-title">LA BOYA</span>
        <span class="header-count" id="socioCount"></span>
      </div>
      <div class="view-buttons">
        <button class="view-btn" data-cols="1" title="Detalle (1 columna)">
          <svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2"/></svg>
        </button>
        <button class="view-btn" data-cols="2" title="Equilibrio (2 columnas)">
          <svg viewBox="0 0 16 16"><rect x="1" y="2" width="5.5" height="12" rx="1.5"/><rect x="9.5" y="2" width="5.5" height="12" rx="1.5"/></svg>
        </button>
        <button class="view-btn" data-cols="4" title="Compacto (4 columnas)">
          <svg viewBox="0 0 16 16"><rect x="0.5" y="2" width="3" height="12" rx="1"/><rect x="4.5" y="2" width="3" height="12" rx="1"/><rect x="8.5" y="2" width="3" height="12" rx="1"/><rect x="12.5" y="2" width="3" height="12" rx="1"/></svg>
        </button>
        <button class="btn-add" id="btnAdd" title="Nuevo socio">+</button>
      </div>
    </div>
    <div class="header-search">
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar socio..." autocomplete="off">
    </div>
    <div class="pills-row">
      <button class="pill active" id="pillNombre" data-sort="nombre">Nombre <span class="pill-arrow"></span></button>
      <button class="pill" id="pillApellidos" data-sort="apellidos">Apellidos <span class="pill-arrow"></span></button>
      <button class="pill" id="pillNumSocio" data-sort="num_socio">N\u00ba socio <span class="pill-arrow"></span></button>
      <button class="pill" id="pillAsiduidad" data-sort="asiduidad">Asiduidad</button>
      <button class="pill pill-asiduos" id="pillSoloAsiduos"><span class="pill-dot"></span> Solo asiduos</button>
    </div>
  </div>

  <!-- BANNER ERROR GLOBAL -->
  <div class="error-banner" id="errorBanner">
    <span id="errorBannerText"></span>
    <button class="error-banner-close" id="errorBannerClose">&times;</button>
  </div>

  <!-- MOSAICO -->
  <div class="main">
    <div class="loader-wrap" id="loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">Cargando socios...</div>
    </div>
    <div class="grid cols-2" id="grid" style="display:none"></div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- EDITOR DE RECORTE -->
  <div class="crop-overlay" id="cropOverlay">
    <div class="crop-container">
      <div class="crop-header">
        <span>Ajusta la foto</span>
        <button class="crop-rotate-btn" id="cropRotate"><svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-12.36L1 10"/></svg> Rotar</button>
      </div>
      <div class="crop-area">
        <img id="cropImage" src="" alt="">
      </div>
      <div class="crop-actions">
        <button class="btn-cancel" id="cropCancel">Cancelar</button>
        <button class="btn-submit" id="cropConfirm">Recortar y usar</button>
      </div>
    </div>
  </div>

  <!-- FORMULARIO ALTA/EDICIÓN -->
  <div class="form-overlay" id="formOverlay">
    <div class="form-content" id="formContent"></div>
  </div>

  <!-- FICHA SOCIO -->
  <div class="ficha-overlay" id="fichaOverlay">
    <div class="ficha-content" id="fichaContent"></div>
  </div>

  <script>
    // === CONSTANTES ===
    var ASIDUIDAD_COLORS = { 1: '#639922', 2: '#EF9F27', 3: '#E24B4A' };
    var TEXT_COLORS = {
      '#AFA9EC': '#26215C',
      '#F0997B': '#4A1B0C',
      '#5DCAA5': '#04342C',
      '#85B7EB': '#042C53',
      '#ED93B1': '#4B1528',
      '#EF9F27': '#412402',
      '#97C459': '#173404',
      '#F7C1C1': '#501313'
    };

    var AVATAR_COLORS = ['#AFA9EC','#F0997B','#5DCAA5','#85B7EB','#ED93B1','#EF9F27','#97C459','#F7C1C1'];

    // Inyectar transformación Cloudinary en URL
    function cloudinaryThumb(url, size) {
      if (!url) return '';
      return url.replace('/upload/', '/upload/w_' + size + ',h_' + size + ',c_fill,g_face,q_auto/');
    }

    // === ESTADO ===
    var socios = [];
    var currentView = localStorage.getItem('la_boya_vista') || '2';
    var currentSort = localStorage.getItem('la_boya_orden') || 'nombre';
    var currentDir = localStorage.getItem('la_boya_orden_direccion') || 'asc';
    var soloAsiduos = localStorage.getItem('la_boya_solo_asiduos') === 'true';

    // === NORMALIZAR TEXTO (quitar tildes, minúsculas) ===
    function norm(text) {
      return (text || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    // === INICIALES ===
    function getInitials(nombre, apellidos) {
      var n = nombre ? nombre.trim().charAt(0).toUpperCase() : '';
      var a = apellidos ? apellidos.trim().charAt(0).toUpperCase() : '';
      return n + a;
    }

    // === ESCAPE HTML ===
    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // === FILTRAR + ORDENAR ===
    function getFilteredSocios() {
      var query = norm(document.getElementById('searchInput').value.trim());
      var result = socios.slice();

      // Filtro búsqueda
      if (query) {
        result = result.filter(function(s) {
          var full = norm(s.nombre + ' ' + s.apellidos);
          return full.indexOf(query) !== -1;
        });
      }

      // Filtro solo asiduos
      if (soloAsiduos) {
        result = result.filter(function(s) { return s.asiduidad === 1; });
      }

      // Ordenar
      result.sort(function(a, b) {
        if (currentSort === 'nombre') {
          var cmp = norm(a.nombre).localeCompare(norm(b.nombre));
          return currentDir === 'desc' ? -cmp : cmp;
        } else if (currentSort === 'apellidos') {
          var cmp = norm(a.apellidos).localeCompare(norm(b.apellidos));
          return currentDir === 'desc' ? -cmp : cmp;
        } else if (currentSort === 'num_socio') {
          var cmp = (a.num_socio || 0) - (b.num_socio || 0);
          return currentDir === 'desc' ? -cmp : cmp;
        } else {
          // Asiduidad: 1 > 2 > 3, dentro de cada nivel alfabético por apellidos
          if (a.asiduidad !== b.asiduidad) return a.asiduidad - b.asiduidad;
          return norm(a.apellidos).localeCompare(norm(b.apellidos));
        }
      });

      return result;
    }

    // === RENDER MOSAICO ===
    function renderGrid() {
      var grid = document.getElementById('grid');
      grid.className = 'grid cols-' + currentView;
      grid.innerHTML = '';

      var filtered = getFilteredSocios();

      // Actualizar contador
      var countEl = document.getElementById('socioCount');
      if (filtered.length === socios.length) {
        countEl.textContent = socios.length + ' socios';
      } else {
        countEl.textContent = filtered.length + ' de ' + socios.length + ' socios';
      }

      // Mensaje vacío
      if (filtered.length === 0) {
        if (socios.length === 0) {
          grid.innerHTML =
            '<div class="empty-state">' +
              '<div class="empty-state-icon"><svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="28"/><line x1="32" y1="20" x2="32" y2="44"/><line x1="20" y1="32" x2="44" y2="32"/></svg></div>' +
              '<div class="empty-state-title">A\u00fan no hay socios</div>' +
              '<div class="empty-state-sub">Pulsa el bot\u00f3n + para a\u00f1adir el primero</div>' +
              '<button class="empty-state-btn" id="emptyAddBtn">+ A\u00f1adir primer socio</button>' +
            '</div>';
          var emptyBtn = document.getElementById('emptyAddBtn');
          if (emptyBtn) emptyBtn.addEventListener('click', function() { abrirFormulario(null); });
        } else {
          grid.innerHTML =
            '<div class="empty-state">' +
              '<div class="empty-state-icon"><svg viewBox="0 0 64 64"><circle cx="26" cy="26" r="18"/><line x1="39" y1="39" x2="54" y2="54"/><line x1="18" y1="26" x2="34" y2="26" stroke-dasharray="3 3"/></svg></div>' +
              '<div class="empty-state-title">Sin resultados</div>' +
              '<div class="empty-state-sub">Ning\u00fan socio coincide con tu b\u00fasqueda</div>' +
            '</div>';
        }
        return;
      }

      for (var i = 0; i < filtered.length; i++) {
        var s = filtered[i];
        var initials = getInitials(s.nombre, s.apellidos);
        var bgColor = s.avatar_color || '#85B7EB';
        var textColor = TEXT_COLORS[bgColor] || '#333';
        var dotColor = ASIDUIDAD_COLORS[s.asiduidad] || '#999';

        // Info extra para vista detalle (1 col)
        var extraParts = [];
        if (s.num_socio) extraParts.push('N\u00ba ' + s.num_socio);
        if (s.antiguedad_años) extraParts.push(s.antiguedad_años + ' a\u00f1os');
        var extraLine = extraParts.join(' \u00b7 ');
        var notaLine = '';
        if (s.notas) {
          notaLine = s.notas.split('\n')[0];
          if (notaLine.length > 50) notaLine = notaLine.substring(0, 50) + '\u2026';
        }

        var card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('data-id', s.id);
        card.addEventListener('click', (function(socioId) {
          return function() { abrirFicha(socioId); };
        })(s.id));
        // Determinar tamaño de thumb según vista
        var thumbSizes = { '1': 180, '2': 160, '4': 120 };
        var thumbSize = thumbSizes[currentView] || 160;
        var avatarInner;
        if (s.foto_url) {
          avatarInner = '<img src="' + cloudinaryThumb(s.foto_url, thumbSize) + '" alt="" loading="lazy" decoding="async" onerror="this.parentElement.innerHTML=\'<span style=\\\'color:' + textColor + '\\\'>' + initials + '</span>\';this.parentElement.style.background=\'' + bgColor + '\'">';
        } else {
          avatarInner = '<span style="color:' + textColor + '">' + initials + '</span>';
        }

        card.innerHTML =
          '<div class="avatar-wrap">' +
            '<div class="avatar" style="background:' + (s.foto_url ? 'transparent' : bgColor) + '" data-bg="' + bgColor + '">' +
              avatarInner +
            '</div>' +
            '<div class="asiduidad-dot" style="background:' + dotColor + '"></div>' +
          '</div>' +
          '<div class="card-info">' +
            '<div class="card-name">' + escapeHtml(s.nombre) + '</div>' +
            '<div class="card-surname">' + escapeHtml(s.apellidos) + '</div>' +
            '<div class="card-extra">' +
              (extraLine ? escapeHtml(extraLine) : '') +
              (notaLine ? '<br>' + escapeHtml(notaLine) : '') +
            '</div>' +
          '</div>';

        grid.appendChild(card);
      }
    }

    // === VISTA ===
    function setView(cols) {
      currentView = cols;
      localStorage.setItem('la_boya_vista', cols);
      renderGrid();
      updateViewButtons();
    }

    function updateViewButtons() {
      var btns = document.querySelectorAll('.view-btn');
      for (var i = 0; i < btns.length; i++) {
        var btn = btns[i];
        if (btn.getAttribute('data-cols') === currentView) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      }
    }

    // === PILLS ORDENACIÓN ===
    function setSort(campo) {
      if (campo === 'asiduidad') {
        currentSort = 'asiduidad';
        currentDir = 'asc';
      } else if (currentSort === campo) {
        currentDir = currentDir === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort = campo;
        currentDir = 'asc';
      }
      localStorage.setItem('la_boya_orden', currentSort);
      localStorage.setItem('la_boya_orden_direccion', currentDir);
      updatePills();
      renderGrid();
    }

    function toggleSoloAsiduos() {
      soloAsiduos = !soloAsiduos;
      localStorage.setItem('la_boya_solo_asiduos', soloAsiduos);
      updatePills();
      renderGrid();
    }

    function updatePills() {
      var sortPills = document.querySelectorAll('.pill[data-sort]');
      for (var i = 0; i < sortPills.length; i++) {
        var pill = sortPills[i];
        var campo = pill.getAttribute('data-sort');
        var arrowSpan = pill.querySelector('.pill-arrow');
        if (campo === currentSort) {
          pill.classList.add('active');
          if (arrowSpan) {
            arrowSpan.textContent = campo === 'asiduidad' ? '' : (currentDir === 'asc' ? '\u2191' : '\u2193');
          }
        } else {
          pill.classList.remove('active');
          if (arrowSpan) arrowSpan.textContent = '';
        }
      }
      var asidPill = document.getElementById('pillSoloAsiduos');
      if (soloAsiduos) {
        asidPill.classList.add('active');
      } else {
        asidPill.classList.remove('active');
      }
    }

    // === INIT ===
    function init() {
      // Botones de vista
      var btns = document.querySelectorAll('.view-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].addEventListener('click', function() {
          setView(this.getAttribute('data-cols'));
        });
      }

      // Pills de ordenación
      var sortPills = document.querySelectorAll('.pill[data-sort]');
      for (var i = 0; i < sortPills.length; i++) {
        sortPills[i].addEventListener('click', function() {
          setSort(this.getAttribute('data-sort'));
        });
      }

      // Pill solo asiduos
      document.getElementById('pillSoloAsiduos').addEventListener('click', toggleSoloAsiduos);

      // Búsqueda instantánea
      document.getElementById('searchInput').addEventListener('input', function() {
        renderGrid();
      });

      // Botón nuevo socio
      document.getElementById('btnAdd').addEventListener('click', function() {
        abrirFormulario(null);
      });

      // Error banner close
      document.getElementById('errorBannerClose').addEventListener('click', function() {
        document.getElementById('errorBanner').classList.remove('visible');
      });

      // Cargar socios
      fetch('/api/socios')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          socios = data;
          updateViewButtons();
          updatePills();
          hideLoader();
          renderGrid();
        })
        .catch(function(err) {
          console.error('Error cargando socios:', err);
          hideLoader();
          showError(friendlyError(err));
        });
    }

    // === FICHA INDIVIDUAL ===
    var MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    var FICHA_SIZES = {
      S: { avatar: 80, font: 24, dot: 18 },
      M: { avatar: 110, font: 36, dot: 22 },
      L: { avatar: 160, font: 52, dot: 28 }
    };

    function formatFecha(str) {
      if (!str) return '';
      var parts = str.split('-');
      if (parts.length !== 3) return str;
      var d = parseInt(parts[2], 10);
      var m = parseInt(parts[1], 10) - 1;
      var y = parts[0];
      return d + ' ' + MESES[m] + ' ' + y;
    }

    function findSocio(id) {
      for (var i = 0; i < socios.length; i++) {
        if (socios[i].id === id) return socios[i];
      }
      return null;
    }

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('visible');
      setTimeout(function() { t.classList.remove('visible'); }, 2000);
    }

    // Error banner global
    var errorTimer = null;
    function showError(msg) {
      var banner = document.getElementById('errorBanner');
      document.getElementById('errorBannerText').textContent = msg;
      banner.classList.add('visible');
      if (errorTimer) clearTimeout(errorTimer);
      errorTimer = setTimeout(function() { banner.classList.remove('visible'); }, 5000);
    }
    function friendlyError(err) {
      if (!err) return 'Algo ha ido mal. Int\u00e9ntalo de nuevo.';
      var msg = err.message || String(err);
      if (msg.indexOf('Failed to fetch') !== -1 || msg.indexOf('NetworkError') !== -1) {
        return 'No se pudo conectar con el servidor. Revisa tu conexi\u00f3n.';
      }
      if (msg.indexOf('404') !== -1 || msg.indexOf('no encontrado') !== -1) {
        return 'Este socio ya no existe. Recarga la p\u00e1gina.';
      }
      if (msg.indexOf('foto') !== -1 || msg.indexOf('Cloudinary') !== -1) {
        return 'No se pudo subir la foto. Int\u00e9ntalo de nuevo.';
      }
      return msg || 'Algo ha ido mal. Int\u00e9ntalo de nuevo.';
    }

    // Loader
    var loaderMinTime = Date.now() + 300;
    function hideLoader() {
      var remaining = Math.max(0, loaderMinTime - Date.now());
      setTimeout(function() {
        var loader = document.getElementById('loader');
        loader.classList.add('fade-out');
        setTimeout(function() { loader.style.display = 'none'; }, 300);
        document.getElementById('grid').style.display = '';
      }, remaining);
    }

      var dot = document.getElementById('fichaDot');
      if (av) {
        av.style.width = cfg.avatar + 'px';
        av.style.height = cfg.avatar + 'px';
        av.style.fontSize = cfg.font + 'px';
      }
      if (dot) {
        dot.style.width = cfg.dot + 'px';
        dot.style.height = cfg.dot + 'px';
      }
      var btns = document.querySelectorAll('.ficha-size-btn');
      for (var i = 0; i < btns.length; i++) {
        if (btns[i].getAttribute('data-size') === size) {
          btns[i].classList.add('active');
        } else {
          btns[i].classList.remove('active');

      }

    function abrirFicha(id) {

      var notasEditadoHtml = s.notas_editado

      var html =

            '<button class="ficha-size-btn" data-size="S">S</button>' +

          '<button class="btn-editar-datos" id="btnEditarDatos"><svg viewBox="0 0 18 18" width="14" height="14" style="stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;margin-right:3px"><path d="M10.5 3.5l4 4L5 17H1v-4z"/><path d="M10.5 3.5l2-2 4 4-2 2"/></svg>Editar datos</button>' +

          '<button class="asiduidad-btn' + (s.asiduidad === 2 ? ' sel-2' : '') + '" data-val="2">Alguna vez</button>' +

      // Detectar cambios pendientes
      function hayPendientes() {
        var notasChanged = document.getElementById('fichaNotas').value !== notasOriginal;
        var asidChanged = asiduidadLocal !== asiduidadOriginal;
        return notasChanged || asidChanged;
      }

      function updateBtnGuardar() {
        var pendiente = hayPendientes();
        document.getElementById('btnGuardar').disabled = !pendiente;
        document.getElementById('btnGuardarMobile').disabled = !pendiente;
      }

      // Botón volver con confirmación
      function intentarCerrar() {
        if (hayPendientes()) {
          if (!confirm('Hay cambios sin guardar. \u00bfDescartar y volver?')) return;
          asiduidadLocal = asiduidadOriginal;
        }
        cerrarFicha();
      }

      document.getElementById('fichaBack').addEventListener('click', intentarCerrar);
      document.getElementById('fichaBackMobile').addEventListener('click', intentarCerrar);

      var escHandler = function(e) {
        if (e.key === 'Escape') intentarCerrar();
      };
      document.addEventListener('keydown', escHandler);

      overlay.addEventListener('click', function overlayClick(e) {
        if (e.target === overlay) {
          intentarCerrar();
          overlay.removeEventListener('click', overlayClick);
        }
      });

      // Botones asiduidad — solo cambio visual local
      var asidBtns = document.querySelectorAll('#asiduidadBtns .asiduidad-btn');
      for (var i = 0; i < asidBtns.length; i++) {
        asidBtns[i].addEventListener('click', function() {
          var val = parseInt(this.getAttribute('data-val'), 10);
          if (val === asiduidadLocal) return;
          asiduidadLocal = val;
          updateAsiduidadUI(val);
          updateBtnGuardar();
        });
      }

      // Textarea notas
      var textarea = document.getElementById('fichaNotas');
      textarea.addEventListener('input', updateBtnGuardar);

      // Botón Guardar unificado
      function ejecutarGuardar() {
        var btnD = document.getElementById('btnGuardar');
        var btnM = document.getElementById('btnGuardarMobile');
        btnD.disabled = true;
        btnM.disabled = true;

        var promises = [];
        var asidChanged = asiduidadLocal !== asiduidadOriginal;
        var notasChanged = textarea.value !== notasOriginal;

        if (asidChanged) {
          promises.push(
            fetch('/api/socios/' + id + '/asiduidad', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ asiduidad: asiduidadLocal })
            }).then(function(res) {
              if (!res.ok) throw new Error('Error guardando asiduidad');
              return res.json();
            })
          );
        }

        if (notasChanged) {
          promises.push(
            fetch('/api/socios/' + id + '/notas', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ notas: textarea.value })
            }).then(function(res) {
              if (!res.ok) throw new Error('Error guardando notas');
              return res.json();
            })
          );
        }

        Promise.all(promises)
          .then(function(results) {
            for (var r = 0; r < results.length; r++) {
              var updated = results[r];
              if (updated.asiduidad !== undefined) s.asiduidad = updated.asiduidad;
              if (updated.notas !== undefined) s.notas = updated.notas;
              if (updated.notas_editado !== undefined) s.notas_editado = updated.notas_editado;
              if (updated.fecha_modificacion) s.fecha_modificacion = updated.fecha_modificacion;
            }
            cerrarFicha();
            showToast('\u2713 Cambios guardados');
          })
          .catch(function(err) {
            console.error('Error guardando:', err);
            btnD.disabled = false;
            btnM.disabled = false;
            showError(friendlyError(err));
          });
      }

      document.getElementById('btnGuardar').addEventListener('click', ejecutarGuardar);
      document.getElementById('btnGuardarMobile').addEventListener('click', ejecutarGuardar);

      // Botón editar datos
      document.getElementById('btnEditarDatos').addEventListener('click', function() {
        cerrarFicha();
        abrirFormulario(s);
      });

      // Botón eliminar
      document.getElementById('btnEliminar').addEventListener('click', function() {
        if (!confirm('\u00bfSeguro que quieres eliminar a ' + s.nombre + ' ' + s.apellidos + '? Esta acci\u00f3n no se puede deshacer.')) return;
        fetch('/api/socios/' + id, { method: 'DELETE' })
          .then(function(res) {
            if (!res.ok) throw new Error('Error eliminando');
            return res.json();
          })
          .then(function() {
            // Quitar de la lista local
            for (var idx = 0; idx < socios.length; idx++) {
              if (socios[idx].id === id) { socios.splice(idx, 1); break; }
            }
            cerrarFicha();
            showToast('\u2713 Socio eliminado');
          })
          .catch(function(err) {
            console.error(err);
            showError(friendlyError(err));
          });
      });

      function cerrarFicha() {
        overlay.classList.remove('open');
        document.removeEventListener('keydown', escHandler);
        setTimeout(function() {
          document.body.style.overflow = '';
          renderGrid();
        }, 300);
      }
    }

    // === RECARGAR SOCIOS ===
    function recargarSocios(cb) {
      fetch('/api/socios')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          socios = data;
          renderGrid();
          if (cb) cb();
        })
        .catch(function(err) { console.error('Error recargando:', err); });
    }

      var content = document.getElementById('formContent');

      var fotoPreviewUrl = socioExistente && socioExistente.foto_url ? socioExistente.foto_url : '';
      var asiduidadForm = socioExistente ? socioExistente.asiduidad : 2;

      // Mostrar preview circular tras recorte o selección directa
      function mostrarPreview(dataUrl) {
        fotoPreviewUrl = dataUrl;
        var circle = document.getElementById('formPhotoCircle');
        circle.classList.add('has-photo');
        circle.innerHTML = '<img id="formPhotoPreview" src="' + dataUrl + '" alt=""><button type="button" class="form-photo-remove" id="formPhotoRemove">\u00d7</button>';
        document.getElementById('formPhotoRemove').addEventListener('click', function(ev2) {
          ev2.stopPropagation();
          removePhoto();
        });
      }

      // Abrir editor de recorte con Cropper.js
      function abrirCropEditor(dataUrl) {
        var cropOverlay = document.getElementById('cropOverlay');
        var cropImage = document.getElementById('cropImage');
        cropImage.src = dataUrl;
        cropOverlay.classList.add('open');

        var cropper = new window.Cropper(cropImage, {
          aspectRatio: 1,
          viewMode: 1,
          dragMode: 'move',
          guides: false,
          center: true,
          autoCropArea: 0.9,
          cropBoxResizable: false,
          toggleDragModeOnDblclick: false,
          minCropBoxWidth: 200,
          background: false,
          zoomable: true,
          wheelZoomRatio: 0.1
        });

        function limpiarCropper() {
          cropper.destroy();
          cropOverlay.classList.remove('open');
          cropImage.src = '';
          document.getElementById('cropCancel').removeEventListener('click', onCancel);
          document.getElementById('cropConfirm').removeEventListener('click', onConfirm);
          document.getElementById('cropRotate').removeEventListener('click', onRotate);
        }

        function onCancel() {
          limpiarCropper();
          // Limpiar input para que se pueda volver a elegir la misma foto
          document.getElementById('formFileCamera').value = '';
          document.getElementById('formFileGallery').value = '';
        }

        function onConfirm() {
          var canvas = cropper.getCroppedCanvas({
            width: 500,
            height: 500,
            imageSmoothingQuality: 'high'
          });
          canvas.toBlob(function(blob) {
            fotoFile = new File([blob], 'foto.jpg', { type: 'image/jpeg' });
            mostrarPreview(canvas.toDataURL('image/jpeg', 0.92));
            limpiarCropper();
          }, 'image/jpeg', 0.92);
        }

        function onRotate() {
          cropper.rotate(90);
        }

        document.getElementById('cropCancel').addEventListener('click', onCancel);
        document.getElementById('cropConfirm').addEventListener('click', onConfirm);
        document.getElementById('cropRotate').addEventListener('click', onRotate);
      }

      // File selected
      function handleFile(e) {
        var file = e.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function(ev) {
          // Si Cropper.js está disponible, abrir editor
          if (window.Cropper) {
            abrirCropEditor(ev.target.result);
          } else {
            // Fallback: usar foto sin recortar
            console.log('Cropper.js no disponible, subiendo foto sin recortar');
            fotoFile = file;
            mostrarPreview(ev.target.result);
          }
        };
        reader.readAsDataURL(file);
      }
      document.getElementById('formFileCamera').addEventListener('change', handleFile);
      document.getElementById('formFileGallery').addEventListener('change', handleFile);

      // Remove photo
      function removePhoto() {
        fotoFile = null;
        fotoPreviewUrl = '';

      // Asiduidad buttons
      var asidBtns = document.querySelectorAll('#formAsidBtns .asiduidad-btn');
      for (var i = 0; i < asidBtns.length; i++) {
        asidBtns[i].addEventListener('click', function() {

      // Cancel / Back
      function cerrarForm() {

      }
      document.getElementById('formCancel').addEventListener('click', cerrarForm);
      document.getElementById('formBack').addEventListener('click', cerrarForm);

      // Submit
      document.getElementById('formSubmit').addEventListener('click', function() {
        var btn = this;
        var nombre = document.getElementById('formNombre').value.trim();
        var apellidos = document.getElementById('formApellidos').value.trim();
        var numSocio = document.getElementById('formNumSocio').value.trim();
        var banner = document.getElementById('formErrorBanner');
        banner.style.display = 'none';

        // Limpiar errores
        var inputs = document.querySelectorAll('.form-input');
        for (var k = 0; k < inputs.length; k++) inputs[k].classList.remove('error');

        // Validar
        var errors = [];
        if (!nombre) { errors.push('Nombre'); document.getElementById('formNombre').classList.add('error'); }
        if (!apellidos) { errors.push('Apellidos'); document.getElementById('formApellidos').classList.add('error'); }
        if (!numSocio || isNaN(parseInt(numSocio, 10))) { errors.push('N\u00ba de socio'); document.getElementById('formNumSocio').classList.add('error'); }
        if (errors.length) {
          banner.textContent = 'Completa los campos obligatorios: ' + errors.join(', ');
          banner.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Guardando...';

        var formData = new FormData();
        formData.append('nombre', nombre);
        formData.append('apellidos', apellidos);
        formData.append('num_socio', numSocio);
        formData.append('antiguedad_años', document.getElementById('formAntiguedad').value || '0');
        formData.append('asiduidad', asiduidadForm);
        formData.append('notas', document.getElementById('formNotas').value);
        if (fotoFile) formData.append('foto', fotoFile);

        var url = esEdicion ? '/api/socios/' + socioExistente.id : '/api/socios';
        var method = esEdicion ? 'PUT' : 'POST';

        fetch(url, { method: method, body: formData })
          .then(function(res) {
            if (!res.ok) return res.json().then(function(d) { throw new Error(d.error || 'Error del servidor'); });
            return res.json();
          })
          .then(function() {
            cerrarForm();
            recargarSocios(function() {
              showToast(esEdicion ? '\u2713 Socio actualizado' : '\u2713 Socio creado');
            });
          })
          .catch(function(err) {
            console.error(err);
            banner.textContent = err.message || 'Error al guardar';
            banner.style.display = 'block';
            btn.disabled = false;
            btn.textContent = btnText;
          });
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
