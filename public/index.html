      document.getElementById('costeModalCancel').addEventListener('click', function() { div.remove(); });
      document.getElementById('costeModalSave').addEventListener('click', function() {
        var val = parseFloat(document.getElementById('costeVal').value);
        if (isNaN(val) || val <= 0) { showToast('Introduce un valor v\u00e1lido'); return; }
        var body = { modo_calculo: modoSel };
        if (modoSel === 'precio_fijo') { body.precio_por_persona = val; body.coste_total = null; }
        else { body.coste_total = val; body.precio_por_persona = null; }
        fetch('/api/eventos/' + evt.id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
          .then(function(r) { return r.json(); })
          .then(function(updated) { div.remove(); renderDetalleEvento(updated); showToast('\u2713 Coste actualizado'); })
          .catch(function(err) { showError(friendlyError(err)); });
      });
    }

    // === PDF ===
    var DIAS_SEMANA = ['domingo','lunes','martes','mi\u00e9rcoles','jueves','viernes','s\u00e1bado'];

    function pdfFileName(evt, suffix) {
      var base = evt.tipo === 'comida_social' ? 'Comida' : evt.nombre;
      base = base.replace(/[^a-zA-Z0-9\u00e0-\u00ff ]/g, '').replace(/\s+/g, '_').substring(0, 30);
      var dp = evt.fecha.split('-');
      return 'LA_BOYA_' + base + '_' + dp[2] + MESES_LARGO[parseInt(dp[1],10)-1] + dp[0] + '_' + suffix + '.pdf';
    }

    function pdfFechaLarga(str) {
      var p = str.split('-');
      var d = new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
      return DIAS_SEMANA[d.getDay()] + ' ' + parseInt(p[2],10) + ' ' + MESES_LARGO[parseInt(p[1],10)-1] + ' ' + p[0];
    }

    function abrirModalPdf(evt, ppp, totalPersonas, pagantes, totalRecaudar, totalCobrado, nBoya, costeBoya) {
      var ex = document.getElementById('pdfModalOverlay');
      if (ex) ex.remove();
      var div = document.createElement('div');
      div.className = 'coste-modal-overlay open';
      div.id = 'pdfModalOverlay';
      div.innerHTML =
        '<div class="coste-modal">' +
          '<div class="coste-modal-title">Generar PDF</div>' +
          '<div class="pdf-option" id="pdfMovil">' +
            '<svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>' +
            '<div class="pdf-option-title">PDF para m\u00f3vil</div>' +
            '<div class="pdf-option-sub">Compacto, ideal para WhatsApp</div>' +
          '</div>' +
          '<div class="pdf-option" id="pdfA4">' +
            '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
            '<div class="pdf-option-title">PDF para imprimir (A4)</div>' +
            '<div class="pdf-option-sub">Formato formal para archivar</div>' +
          '</div>' +
          '<button class="btn-cancel" id="pdfCancel" style="width:100%;margin-top:8px">Cancelar</button>' +
        '</div>';
      document.body.appendChild(div);
      document.getElementById('pdfCancel').addEventListener('click', function() { div.remove(); });
      document.getElementById('pdfMovil').addEventListener('click', function() { div.remove(); generarPdfMovil(evt, ppp, totalPersonas, pagantes, totalRecaudar, totalCobrado, nBoya, costeBoya); });
      document.getElementById('pdfA4').addEventListener('click', function() { div.remove(); generarPdfA4(evt, ppp, totalPersonas, pagantes, totalRecaudar, totalCobrado, nBoya, costeBoya); });
    }

    function getPdfAsistentes(evt) {
      var sortFn = function(a, b) {
        var sa = findSocio(a.socio_id); var sb = findSocio(b.socio_id);
        if (!sa || !sb) return 0;
        return norm(sa.apellidos).localeCompare(norm(sb.apellidos));
      };
      return {
        pendientes: evt.asistentes.filter(function(a) { return !a.pagado; }).sort(sortFn),
        pagados: evt.asistentes.filter(function(a) { return a.pagado; }).sort(sortFn),
        boya: (evt.invitados_boya || []).slice().sort(function(a,b) { return norm(a.nombre).localeCompare(norm(b.nombre)); })
      };
    }

    // Helper: nueva pagina con mini-cabecera
    function pdfNewPage(doc, mx, evtNombre, format) {
      doc.addPage();
      var w = doc.internal.pageSize.getWidth();
      var barH = format === 'a5' ? 8 : 10;
      doc.setFillColor(12, 68, 124); doc.rect(0, 0, w, barH, 'F');
      doc.setFont('helvetica', 'bold'); doc.setFontSize(format === 'a5' ? 9 : 10); doc.setTextColor(255, 255, 255);
      doc.text('LA BOYA \u00b7 ' + evtNombre, w / 2, barH - 2.5, { align: 'center' });
      return barH + 6;
    }

    function generarPdfMovil(evt, ppp, totalPersonas, pagantes, totalRecaudar, totalCobrado, nBoya, costeBoya) {
      try {
        var doc = new window.jspdf.jsPDF({ format: 'a5', orientation: 'portrait' });
        var w = doc.internal.pageSize.getWidth();
        var h = doc.internal.pageSize.getHeight();
        var mx = 12; var cw = w - mx * 2; var y = 0;
        var pendiente = Math.round((totalRecaudar - totalCobrado) * 100) / 100;
        var data = getPdfAsistentes(evt);
        var tipoLabel = evt.tipo === 'comida_social' ? 'COMIDA SOCIAL' : 'EVENTO';

        // Cabecera azul
        doc.setFillColor(12, 68, 124); doc.rect(0, 0, w, 18, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(20); doc.setTextColor(255, 255, 255);
        doc.text('LA BOYA', w / 2, 10, { align: 'center' });
        doc.setLineWidth(0.3); doc.setDrawColor(255, 255, 255); doc.line(w / 2 - 30, 13, w / 2 + 30, 13);
        doc.setFontSize(8); doc.text(tipoLabel, w / 2, 16.5, { align: 'center' });
        y = 26;

        // Nombre y fecha
        doc.setFont('helvetica', 'bold'); doc.setFontSize(13); doc.setTextColor(30, 30, 30);
        doc.text(evt.nombre, w / 2, y, { align: 'center', maxWidth: cw }); y += 5;
        doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(102, 102, 102);
        doc.text(pdfFechaLarga(evt.fecha), w / 2, y, { align: 'center' }); y += 8;

        // Resumen cards - fila 1 (3 cards)
        var gap = 3; var cardW = (cw - gap * 2) / 3; var cardH = 16;
        var r1 = [
          { label: 'ASISTENTES', val: String(totalPersonas), bg: [245,245,245], tc: [30,30,30] },
          { label: 'POR PERSONA', val: ppp.toFixed(2) + ' \u20ac', bg: [245,245,245], tc: [30,30,30] },
          { label: 'TOTAL', val: totalRecaudar.toFixed(2) + ' \u20ac', bg: [245,245,245], tc: [30,30,30] }
        ];
        for (var c = 0; c < 3; c++) {
          var cx = mx + c * (cardW + gap);
          doc.setFillColor(r1[c].bg[0], r1[c].bg[1], r1[c].bg[2]); doc.roundedRect(cx, y, cardW, cardH, 2, 2, 'F');
          doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.setTextColor(r1[c].tc[0], r1[c].tc[1], r1[c].tc[2]);
          doc.text(r1[c].val, cx + cardW / 2, y + 7, { align: 'center' });
          doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5); doc.setTextColor(102, 102, 102);
          doc.text(r1[c].label, cx + cardW / 2, y + 12.5, { align: 'center' });
        }
        y += cardH + gap;
        // Fila 2 (2 cards: cobrado + pendiente)
        var card2W = (cw - gap) / 2;
        var cobBg = totalCobrado > 0 ? [234,243,222] : [245,245,245];
        var cobTc = totalCobrado > 0 ? [23,52,4] : [30,30,30];
        doc.setFillColor(cobBg[0], cobBg[1], cobBg[2]); doc.roundedRect(mx, y, card2W, cardH, 2, 2, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.setTextColor(cobTc[0], cobTc[1], cobTc[2]);
        doc.text(totalCobrado.toFixed(2) + ' \u20ac', mx + card2W / 2, y + 7, { align: 'center' });
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5); doc.setTextColor(cobTc[0], cobTc[1], cobTc[2]);
        doc.text('COBRADO', mx + card2W / 2, y + 12.5, { align: 'center' });

        var px = mx + card2W + gap;
        var pBg = pendiente > 0 ? [252,235,235] : [234,243,222];
        var pTc = pendiente > 0 ? [121,31,31] : [23,52,4];
        doc.setFillColor(pBg[0], pBg[1], pBg[2]); doc.roundedRect(px, y, card2W, cardH, 2, 2, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.setTextColor(pTc[0], pTc[1], pTc[2]);
        doc.text(pendiente > 0 ? pendiente.toFixed(2) + ' \u20ac' : '\u2713 OK', px + card2W / 2, y + 7, { align: 'center' });
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5);
        doc.text('PENDIENTE', px + card2W / 2, y + 12.5, { align: 'center' });
        y += cardH + 8;

        // Render section
        function renderSection(list, label, bgColor, textColor, isPagado) {
          if (list.length === 0) return;
          if (y > h - 25) y = pdfNewPage(doc, mx, evt.nombre, 'a5');
          // Section header bar
          doc.setFillColor(bgColor[0], bgColor[1], bgColor[2]); doc.roundedRect(mx, y, cw, 7, 1.5, 1.5, 'F');
          doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(textColor[0], textColor[1], textColor[2]);
          doc.text(label, mx + 4, y + 5); y += 10;

          for (var i = 0; i < list.length; i++) {
            if (y > h - 18) y = pdfNewPage(doc, mx, evt.nombre, 'a5');
            var a = list[i]; var soc = findSocio(a.socio_id); if (!soc) continue;
            if (i % 2 === 0) { doc.setFillColor(250, 250, 250); doc.rect(mx, y - 3, cw, a.invitados > 0 ? 10 : 7, 'F'); }
            // Name
            doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(30, 30, 30);
            doc.text(soc.nombre + ' ' + soc.apellidos, mx + 2, y, { maxWidth: cw - 55 });
            // Amount
            var amt = ((1 + (a.invitados || 0)) * ppp).toFixed(2) + ' \u20ac';
            doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(30, 30, 30);
            doc.text(amt, w - mx - 20, y, { align: 'right' });
            // Badge
            var badgeX = w - mx - 17; var badgeY = y - 3;
            if (isPagado) {
              doc.setFillColor(23, 52, 4); doc.roundedRect(badgeX, badgeY, 15, 5, 1, 1, 'F');
              doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5); doc.setTextColor(255, 255, 255);
              doc.text('\u2713', badgeX + 7.5, y, { align: 'center' });
            } else {
              doc.setFillColor(121, 31, 31); doc.roundedRect(badgeX, badgeY, 15, 5, 1, 1, 'F');
              doc.setFont('helvetica', 'bold'); doc.setFontSize(6); doc.setTextColor(255, 255, 255);
              doc.text('PDTE', badgeX + 7.5, y, { align: 'center' });
            }
            y += 4;
            if (a.invitados > 0) {
              doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(textColor[0], textColor[1], textColor[2]);
              doc.text('+ ' + a.invitados + ' invitado' + (a.invitados > 1 ? 's' : ''), mx + 4, y); y += 3;
            }
            // Separator
            if (i < list.length - 1) { doc.setDrawColor(220, 220, 220); doc.setLineWidth(0.2); doc.line(mx, y, w - mx, y); }
            y += 3;
          }
          y += 4;
        }

        renderSection(data.pendientes, 'PENDIENTES DE PAGO (' + data.pendientes.length + ')', [252,235,235], [121,31,31], false);
        renderSection(data.pagados, 'PAGADOS (' + data.pagados.length + ')', [234,243,222], [23,52,4], true);

        // BOYA
        if (data.boya.length > 0) {
          if (y > h - 20) y = pdfNewPage(doc, mx, evt.nombre, 'a5');
          doc.setFillColor(250, 238, 218); doc.roundedRect(mx, y, cw, 7, 1.5, 1.5, 'F');
          doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(74, 27, 12);
          doc.text('INVITADOS BOYA (SIN PAGO)', mx + 4, y + 5); y += 10;
          for (var b = 0; b < data.boya.length; b++) {
            if (y > h - 15) y = pdfNewPage(doc, mx, evt.nombre, 'a5');
            doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(30, 30, 30);
            doc.text(data.boya[b].nombre, mx + 2, y);
            if (b < data.boya.length - 1) { y += 3; doc.setDrawColor(220, 220, 220); doc.setLineWidth(0.2); doc.line(mx, y, w - mx, y); }
            y += 4;
          }
          if (costeBoya > 0) {
            y += 2; doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5); doc.setTextColor(74, 27, 12);
            doc.text('La sociedad asume: ' + costeBoya.toFixed(2) + ' \u20ac', mx + 2, y); y += 4;
          }
        }

        // Pie
        doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.3); doc.line(mx, h - 14, w - mx, h - 14);
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(150, 150, 150);
        var hoyStr = new Date().toISOString().split('T')[0].split('-');
        doc.text('Generado el ' + hoyStr[2] + '/' + hoyStr[1] + '/' + hoyStr[0] + ' \u00b7 Sociedad Recreativa LA BOYA', w / 2, h - 10, { align: 'center' });

        var fn = pdfFileName(evt, 'movil'); doc.save(fn);
        console.log('PDF generado: ' + fn); showToast('\u2713 PDF descargado');
      } catch (err) { console.error('Error generando PDF:', err); showError('Error al generar el PDF'); }
    }

    function generarPdfA4(evt, ppp, totalPersonas, pagantes, totalRecaudar, totalCobrado, nBoya, costeBoya) {
      try {
        var doc = new window.jspdf.jsPDF({ format: 'a4', orientation: 'portrait' });
        var w = doc.internal.pageSize.getWidth();
        var h = doc.internal.pageSize.getHeight();
        var mx = 20; var cw = w - mx * 2; var y = 0;
        var pendiente = Math.round((totalRecaudar - totalCobrado) * 100) / 100;
        var data = getPdfAsistentes(evt);
        var tipoLabel = evt.tipo === 'comida_social' ? 'COMIDA SOCIAL' : 'EVENTO';

        // Cabecera azul
        doc.setFillColor(12, 68, 124); doc.rect(0, 0, w, 24, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(22); doc.setTextColor(255, 255, 255);
        doc.text('SOCIEDAD RECREATIVA LA BOYA', w / 2, 12, { align: 'center' });
        doc.setLineWidth(0.3); doc.setDrawColor(255, 255, 255); doc.line(w / 2 - 50, 16, w / 2 + 50, 16);
        doc.setFontSize(9); doc.text(tipoLabel, w / 2, 21, { align: 'center' });
        y = 32;

        // Nombre y fecha
        doc.setFont('helvetica', 'bold'); doc.setFontSize(16); doc.setTextColor(30, 30, 30);
        doc.text(evt.nombre, w / 2, y, { align: 'center', maxWidth: cw }); y += 7;
        doc.setFont('helvetica', 'normal'); doc.setFontSize(11); doc.setTextColor(102, 102, 102);
        doc.text(pdfFechaLarga(evt.fecha), w / 2, y, { align: 'center' }); y += 10;

        // Resumen cards - fila 1 (3 cards)
        var gap = 4; var cardW = (cw - gap * 2) / 3; var cardH = 20;
        var r1 = [
          { label: 'ASISTENTES', val: String(totalPersonas) },
          { label: 'POR PERSONA', val: ppp.toFixed(2) + ' \u20ac' },
          { label: 'TOTAL', val: totalRecaudar.toFixed(2) + ' \u20ac' }
        ];
        for (var c = 0; c < 3; c++) {
          var cx = mx + c * (cardW + gap);
          doc.setFillColor(245, 245, 245); doc.roundedRect(cx, y, cardW, cardH, 2, 2, 'F');
          doc.setFont('helvetica', 'bold'); doc.setFontSize(15); doc.setTextColor(30, 30, 30);
          doc.text(r1[c].val, cx + cardW / 2, y + 9, { align: 'center' });
          doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.setTextColor(102, 102, 102);
          doc.text(r1[c].label, cx + cardW / 2, y + 16, { align: 'center' });
        }
        y += cardH + gap;
        // Fila 2 (2 cards)
        var card2W = (cw - gap) / 2;
        var cobBg = totalCobrado > 0 ? [234,243,222] : [245,245,245];
        var cobTc = totalCobrado > 0 ? [23,52,4] : [30,30,30];
        doc.setFillColor(cobBg[0], cobBg[1], cobBg[2]); doc.roundedRect(mx, y, card2W, cardH, 2, 2, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(15); doc.setTextColor(cobTc[0], cobTc[1], cobTc[2]);
        doc.text(totalCobrado.toFixed(2) + ' \u20ac', mx + card2W / 2, y + 9, { align: 'center' });
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.text('COBRADO', mx + card2W / 2, y + 16, { align: 'center' });

        var px = mx + card2W + gap;
        var pBg = pendiente > 0 ? [252,235,235] : [234,243,222];
        var pTc = pendiente > 0 ? [121,31,31] : [23,52,4];
        doc.setFillColor(pBg[0], pBg[1], pBg[2]); doc.roundedRect(px, y, card2W, cardH, 2, 2, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(15); doc.setTextColor(pTc[0], pTc[1], pTc[2]);
        doc.text(pendiente > 0 ? pendiente.toFixed(2) + ' \u20ac' : '\u2713 OK', px + card2W / 2, y + 9, { align: 'center' });
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.text('PENDIENTE', px + card2W / 2, y + 16, { align: 'center' });
        y += cardH + 10;

        // Tabla asistentes
        function renderTableHeader() {
          doc.setFillColor(240, 240, 240); doc.rect(mx, y - 4.5, cw, 8, 'F');
          doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(102, 102, 102);
          doc.text('N\u00ba', mx + 2, y); doc.text('NOMBRE', mx + 12, y); doc.text('INV.', mx + 110, y);
          doc.text('IMPORTE', w - mx - 30, y, { align: 'right' }); doc.text('ESTADO', w - mx - 2, y, { align: 'right' });
          y += 6;
        }

        function renderA4Section(list, label, bgColor, textColor, isPagado) {
          if (list.length === 0) return;
          if (y > h - 30) y = pdfNewPage(doc, mx, evt.nombre, 'a4');
          doc.setFillColor(bgColor[0], bgColor[1], bgColor[2]); doc.roundedRect(mx, y, cw, 8, 1.5, 1.5, 'F');
          doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(textColor[0], textColor[1], textColor[2]);
          doc.text(label, mx + 4, y + 5.5); y += 12;
          renderTableHeader();

          for (var i = 0; i < list.length; i++) {
            if (y > h - 20) { y = pdfNewPage(doc, mx, evt.nombre, 'a4'); renderTableHeader(); }
            var a = list[i]; var soc = findSocio(a.socio_id); if (!soc) continue;
            if (i % 2 === 0) { doc.setFillColor(250, 250, 250); doc.rect(mx, y - 4, cw, 8, 'F'); }
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); doc.setTextColor(30, 30, 30);
            doc.text(String(i + 1), mx + 2, y);
            doc.text(soc.nombre + ' ' + soc.apellidos, mx + 12, y, { maxWidth: 95 });
            doc.text(a.invitados > 0 ? '+' + a.invitados : '-', mx + 110, y);
            var amt = ((1 + (a.invitados || 0)) * ppp).toFixed(2) + ' \u20ac';
            doc.text(amt, w - mx - 30, y, { align: 'right' });
            // Estado: checkbox
            var cbX = w - mx - 8; var cbY = y - 3.5;
            if (isPagado) {
              doc.setFillColor(23, 52, 4); doc.roundedRect(cbX, cbY, 6, 6, 1, 1, 'F');
              doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(255, 255, 255);
              doc.text('\u2713', cbX + 3, y + 0.5, { align: 'center' });
            } else {
              doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.3); doc.rect(cbX, cbY, 6, 6);
            }
            y += 8;
          }
          y += 5;
        }

        renderA4Section(data.pendientes, 'PENDIENTES DE PAGO (' + data.pendientes.length + ')', [252,235,235], [121,31,31], false);
        renderA4Section(data.pagados, 'PAGADOS (' + data.pagados.length + ')', [234,243,222], [23,52,4], true);

        // BOYA
        if (data.boya.length > 0) {
          if (y > h - 30) y = pdfNewPage(doc, mx, evt.nombre, 'a4');
          doc.setFillColor(250, 238, 218); doc.roundedRect(mx, y, cw, 8, 1.5, 1.5, 'F');
          doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(74, 27, 12);
          doc.text('INVITADOS BOYA (SIN PAGO)', mx + 4, y + 5.5); y += 12;
          doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(30, 30, 30);
          for (var b = 0; b < data.boya.length; b++) {
            if (y > h - 15) y = pdfNewPage(doc, mx, evt.nombre, 'a4');
            doc.text((b + 1) + '. ' + data.boya[b].nombre, mx + 4, y); y += 6;
          }
          if (costeBoya > 0) {
            y += 2; doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(74, 27, 12);
            doc.text('La sociedad asume: ' + costeBoya.toFixed(2) + ' \u20ac', mx + 4, y); y += 6;
          }
        }

        // Totales y firma
        if (y > h - 55) y = pdfNewPage(doc, mx, evt.nombre, 'a4');
        y += 6; doc.setDrawColor(200); doc.setLineWidth(0.3); doc.line(mx, y, w - mx, y); y += 8;
        doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(30, 30, 30);
        doc.text('Total a recaudar: ' + totalRecaudar.toFixed(2) + ' \u20ac', mx, y); y += 7;
        doc.text('Total cobrado: ' + totalCobrado.toFixed(2) + ' \u20ac', mx, y); y += 7;
        if (pendiente > 0) doc.setTextColor(121, 31, 31); else doc.setTextColor(23, 52, 4);
        doc.text('Pendiente: ' + pendiente.toFixed(2) + ' \u20ac', mx, y); y += 14;
        doc.setTextColor(102, 102, 102); doc.setFontSize(9);
        doc.text('Firma del tesorero: ________________________', mx, y);

        // Pie
        doc.setDrawColor(200); doc.setLineWidth(0.3); doc.line(mx, h - 16, w - mx, h - 16);
        doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(150, 150, 150);
        var hoyStr = new Date().toISOString().split('T')[0].split('-');
        doc.text('Generado el ' + hoyStr[2] + '/' + hoyStr[1] + '/' + hoyStr[0] + ' \u00b7 SOCIEDAD RECREATIVA LA BOYA', w / 2, h - 11, { align: 'center' });

        var fn = pdfFileName(evt, 'A4'); doc.save(fn);
        console.log('PDF generado: ' + fn); showToast('\u2713 PDF descargado');
      } catch (err) { console.error('Error generando PDF:', err); showError('Error al generar el PDF'); }
    }

    // === WHATSAPP MASIVO DESDE SOCIOS ===
    function abrirWaSeleccion() {
      var overlay = document.getElementById('waSelOverlay');
      var content = document.getElementById('waSelContent');
      var selected = [];
      var sociosOrdenados = socios.slice().sort(function(a, b) { return (a.num_socio || 0) - (b.num_socio || 0); });

      function renderWaSel() {
        var searchEl = document.getElementById('waSelSearch');
        var query = searchEl ? norm(searchEl.value.trim()) : '';
        var filtered = sociosOrdenados.filter(function(s) {
          if (!query) return true;
          return norm(s.nombre + ' ' + s.apellidos).indexOf(query) !== -1;
        });

        var conTel = socios.filter(function(s) { return !!s.telefono; }).length;
        var sinTel = socios.length - conTel;

        var counterHtml = '<span style="font-size:13px;font-weight:500;color:#185FA5">' + selected.length + ' de ' + conTel + ' seleccionados</span>';
        if (sinTel > 0) counterHtml += ' <span style="font-size:11px;color:#999">(' + sinTel + ' sin tel\u00e9fono)</span>';

        var gridHtml = '';
        for (var i = 0; i < filtered.length; i++) {
          var s = filtered[i];
          var hasTel = !!s.telefono;
          var isSel = selected.indexOf(s.id) !== -1;
          var bgC = s.avatar_color || '#85B7EB';
          var txtC = TEXT_COLORS[bgC] || '#333';
          var ini = getInitials(s.nombre, s.apellidos);
          var avatarHtml = s.foto_url
            ? '<img src="' + cloudinaryThumb(s.foto_url, 120) + '" alt="" loading="lazy">'
            : '<span style="color:' + txtC + '">' + ini + '</span>';
          var checkHtml = isSel ? '<div class="sel-check">' + SVG_CHECK + '</div>' : '';
          var noTelBadge = !hasTel ? '<div class="wa-no-tel-badge">Sin tel\u00e9fono</div>' : '';
          gridHtml +=
            '<div class="card' + (!hasTel ? ' wa-no-tel' : '') + '" data-wa-sid="' + s.id + '" style="padding:10px;gap:8px;flex-direction:row;cursor:' + (hasTel ? 'pointer' : 'not-allowed') + '">' +
              '<div class="avatar-wrap" style="position:relative">' +
                '<div class="avatar" style="background:' + (s.foto_url ? 'transparent' : bgC) + ';width:56px;height:56px;font-size:18px">' + avatarHtml + '</div>' +
                checkHtml +
              '</div>' +
              '<div class="card-info"><div class="card-name" style="font-size:13px">' + escapeHtml(s.nombre) + '</div><div class="card-surname" style="font-size:11px">' + escapeHtml(s.apellidos) + '</div>' + noTelBadge + '</div>' +
            '</div>';
        }

        var el = document.getElementById('waSelGrid');
        if (el) { el.innerHTML = '<div class="grid cols-2" style="gap:6px">' + gridHtml + '</div>'; }
        var cEl = document.getElementById('waSelCounter');
        if (cEl) cEl.innerHTML = counterHtml;
        var nextBtn = document.getElementById('waSelNext');
        if (nextBtn) { nextBtn.disabled = selected.length === 0; nextBtn.style.opacity = selected.length === 0 ? '0.5' : '1'; }

        // Tap handlers
        var cards = el ? el.querySelectorAll('.card:not(.wa-no-tel)') : [];
        for (var c = 0; c < cards.length; c++) {
          cards[c].addEventListener('click', function() {
            var sid = this.getAttribute('data-wa-sid');
            var idx = selected.indexOf(sid);
            if (idx === -1) selected.push(sid); else selected.splice(idx, 1);
            renderWaSel();
          });
        }
      }

      content.innerHTML =
        '<div class="sel-bar">' +
          '<button class="ficha-back" id="waSelBack">\u2190 Volver</button>' +
          '<span class="sel-bar-title">Enviar WhatsApp</span>' +
          '<span></span>' +
        '</div>' +
        '<div style="padding:8px 16px"><input class="search-input" id="waSelSearch" placeholder="Buscar socio..." autocomplete="off"></div>' +
        '<div style="padding:0 16px 8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">' +
          '<div style="display:flex;gap:6px">' +
            '<button class="pill" id="waSelAll" style="font-size:11px;padding:4px 10px">\u2713 Seleccionar todos</button>' +
            '<button class="pill" id="waDeselAll" style="font-size:11px;padding:4px 10px">\u2717 Deseleccionar</button>' +
          '</div>' +
          '<div id="waSelCounter"></div>' +
        '</div>' +
        '<div class="main" id="waSelGrid" style="padding:4px 8px"></div>' +
        '<div class="evt-bottom-bar" style="display:flex">' +
          '<button class="btn-cancel" id="waSelCancel">Cancelar</button>' +
          '<button class="btn-wa" id="waSelNext" style="padding:8px 20px;font-size:14px" disabled>' + SVG_WA + ' Siguiente \u2192</button>' +
        '</div>';

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      renderWaSel();

      document.getElementById('waSelSearch').addEventListener('input', renderWaSel);
      document.getElementById('waSelAll').addEventListener('click', function() {
        selected = socios.filter(function(s) { return !!s.telefono; }).map(function(s) { return s.id; });
        renderWaSel();
      });
      document.getElementById('waDeselAll').addEventListener('click', function() {
        selected = [];
        renderWaSel();
      });

      function cerrarWaSel() { overlay.classList.remove('open'); setTimeout(function() { document.body.style.overflow = ''; }, 300); }
      document.getElementById('waSelBack').addEventListener('click', cerrarWaSel);
      document.getElementById('waSelCancel').addEventListener('click', cerrarWaSel);

      document.getElementById('waSelNext').addEventListener('click', function() {
        if (selected.length === 0) return;
        abrirWaMensaje(selected, cerrarWaSel);
      });
    }

    function abrirWaMensaje(selectedIds, cerrarSeleccion) {
      var overlay = document.getElementById('waMsgOverlay');
      var content = document.getElementById('waMsgContent');

      var dests = selectedIds.map(function(id) { return findSocio(id); }).filter(Boolean);
      var chipsHtml = '';
      var max = 10;
      for (var i = 0; i < Math.min(dests.length, max); i++) {
        chipsHtml += '<span class="wa-chip">' + escapeHtml(dests[i].nombre.split(' ')[0] + ' ' + (dests[i].apellidos || '').split(' ')[0]) + '</span>';
      }
      if (dests.length > max) chipsHtml += '<span class="wa-chip" style="background:#F5F5F5;color:#666">...y ' + (dests.length - max) + ' m\u00e1s</span>';

      content.innerHTML =
        '<div class="sel-bar">' +
          '<button class="ficha-back" id="waMsgBack">\u2190 Volver</button>' +
          '<span class="sel-bar-title">Escribir mensaje</span>' +
          '<span></span>' +
        '</div>' +
        '<div style="padding:12px 16px">' +
          '<div style="font-size:13px;font-weight:500;color:#333;margin-bottom:4px">Destinatarios: ' + dests.length + ' socios</div>' +
          '<div class="wa-chips">' + chipsHtml + '</div>' +
        '</div>' +
        '<div style="padding:0 16px">' +
          '<textarea class="notas-textarea-neutral" id="waMsgText" style="min-height:160px;font-size:14px;line-height:1.5" placeholder="Escribe aqu\u00ed tu mensaje..."></textarea>' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">' +
            '<span style="font-size:11px;color:#999" id="waMsgChars">0 caracteres</span>' +
          '</div>' +
          '<div class="wa-tpl-row">' +
            '<button class="wa-tpl-btn" data-tpl="asamblea">Asamblea</button>' +
            '<button class="wa-tpl-btn" data-tpl="comida">Pr\u00f3xima comida</button>' +
            '<button class="wa-tpl-btn" data-tpl="felicita">Felicitaci\u00f3n</button>' +
          '</div>' +
        '</div>' +
        '<div class="evt-bottom-bar" style="display:flex">' +
          '<button class="btn-cancel" id="waMsgCancel">Cancelar</button>' +
          '<button class="btn-wa" id="waMsgSend" style="padding:8px 16px;font-size:14px" disabled>' + SVG_WA + ' Abrir WhatsApp (' + dests.length + ')</button>' +
        '</div>';

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      var textarea = document.getElementById('waMsgText');
      var sendBtn = document.getElementById('waMsgSend');
      textarea.addEventListener('input', function() {
        document.getElementById('waMsgChars').textContent = textarea.value.length + ' caracteres';
        sendBtn.disabled = !textarea.value.trim();
        sendBtn.style.opacity = textarea.value.trim() ? '1' : '0.5';
      });

      // Templates
      var tpls = {
        asamblea: 'Hola, os convocamos a la pr\u00f3xima Asamblea General de LA BOYA el d\u00eda [FECHA] a las [HORA]. Por favor confirmad asistencia. Saludos.',
        comida: 'Hola, os recordamos que la pr\u00f3xima Comida Social de LA BOYA ser\u00e1 el [FECHA]. Los interesados en asistir, confirmar. Un saludo.',
        felicita: '\u00a1Felicidades desde LA BOYA! Un abrazo.'
      };
      var tplBtns = content.querySelectorAll('.wa-tpl-btn');
      for (var t = 0; t < tplBtns.length; t++) {
        tplBtns[t].addEventListener('click', function() {
          textarea.value = tpls[this.getAttribute('data-tpl')] || '';
          textarea.dispatchEvent(new Event('input'));
        });
      }

      function cerrarWaMsg() { overlay.classList.remove('open'); setTimeout(function() { document.body.style.overflow = ''; }, 300); }
      document.getElementById('waMsgBack').addEventListener('click', cerrarWaMsg);
      document.getElementById('waMsgCancel').addEventListener('click', function() { cerrarWaMsg(); cerrarSeleccion(); });

      sendBtn.addEventListener('click', function() {
        if (!textarea.value.trim()) return;
        if (!confirm('Se abrir\u00e1n ' + dests.length + ' pesta\u00f1as de WhatsApp. Deber\u00e1s pulsar Enviar en cada una. \u00bfContinuar?')) return;
        var msg = textarea.value;
        var count = 0;
        for (var d = 0; d < dests.length; d++) {
          if (!dests[d].telefono) continue;
          (function(tel, delay) {
            setTimeout(function() { abrirWhatsApp(tel, msg); }, delay);
          })(dests[d].telefono, count * 400);
          count++;
        }
        cerrarWaMsg();
        cerrarSeleccion();
        console.log('WhatsApp masivo: ' + count + ' mensajes abiertos desde LA BOYA');
        showToast('\u2713 ' + count + ' conversaciones abiertas en WhatsApp');
      });
    }

    // === MODAL AVISAR WHATSAPP ===
    function abrirModalAvisarWa(evt, ppp) {
      var ex = document.getElementById('waAvisarOverlay');
      if (ex) ex.remove();
      var dp = evt.fecha.split('-');
      var dObj = new Date(parseInt(dp[0],10), parseInt(dp[1],10)-1, parseInt(dp[2],10));
      var fechaComp = DIAS_SEMANA[dObj.getDay()] + ', ' + fechaDiaMes(evt.fecha);
      var precioTxt = ppp > 0 ? ppp.toFixed(2) : '(por definir)';
      var defMsg = evt.tipo === 'comida_social'
        ? 'Hola, os recuerdo que el ' + fechaComp + ' tenemos ' + evt.nombre + ' en LA BOYA. Precio por persona: ' + precioTxt + '\u20ac. \u00a1Os esperamos!'
        : 'Hola, os recuerdo que el ' + fechaComp + ' tenemos el evento \'' + evt.nombre + '\' en LA BOYA. Precio por persona: ' + precioTxt + '\u20ac. \u00a1Os esperamos!';

      var listHtml = '';
      for (var i = 0; i < evt.asistentes.length; i++) {
        var soc = findSocio(evt.asistentes[i].socio_id);
        if (!soc) continue;
        if (soc.telefono) {
          listHtml += '<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px"><input type="checkbox" class="wa-check" data-wa-sid="' + soc.id + '" checked> ' + escapeHtml(soc.nombre + ' ' + soc.apellidos) + '</label>';
        } else {
          listHtml += '<div style="padding:4px 0;font-size:12px;color:#CCC">' + escapeHtml(soc.nombre + ' ' + soc.apellidos) + ' \u2014 sin tel\u00e9fono</div>';
        }
      }

      var div = document.createElement('div');
      div.className = 'coste-modal-overlay open';
      div.id = 'waAvisarOverlay';
      div.innerHTML =
        '<div class="coste-modal" style="max-width:440px;max-height:90vh;overflow-y:auto">' +
          '<div class="coste-modal-title">Avisar por WhatsApp</div>' +
          '<div class="form-field"><label class="form-label">Mensaje</label><textarea class="notas-textarea-neutral" id="waMsgText" style="min-height:80px">' + escapeHtml(defMsg) + '</textarea></div>' +
          '<div class="form-field"><label class="form-label">Asistentes a notificar</label><div style="max-height:200px;overflow-y:auto;border:0.5px solid #E0E0E0;border-radius:8px;padding:8px">' + listHtml + '</div></div>' +
          '<div style="display:flex;gap:8px;margin-top:12px">' +
            '<button class="btn-cancel" id="waCancel" style="flex:1">Cancelar</button>' +
            '<button class="btn-wa btn-wa-big" id="waEnviar" style="flex:2">' + SVG_WA + ' Abrir WhatsApp</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(div);

      document.getElementById('waCancel').addEventListener('click', function() { div.remove(); });
      document.getElementById('waEnviar').addEventListener('click', function() {
        var msg = document.getElementById('waMsgText').value;
        var checks = div.querySelectorAll('.wa-check:checked');
        var count = 0;
        for (var c = 0; c < checks.length; c++) {
          var sid = checks[c].getAttribute('data-wa-sid');
          var soc = findSocio(sid);
          if (!soc || !soc.telefono) continue;
          (function(tel, delay) {
            setTimeout(function() { abrirWhatsApp(tel, msg); }, delay);
          })(soc.telefono, count * 500);
          count++;
        }
        div.remove();
        if (count > 0) showToast(count + ' conversaciones abiertas en WhatsApp');
        else showToast('No hay asistentes con tel\u00e9fono seleccionados');
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
